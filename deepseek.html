<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Cek area coverage paket XL Akrab di seluruh Indonesia">
    <meta name="theme-color" content="#0f172a">
    <title>Cek Area XL Akrab — Coverage Checker</title>

    <style>
        /* ================= GLOBAL DESIGN SYSTEM ================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0f172a;
            --accent: #f97316;
            --accent-dark: #ea580c;
            --success: #25D366;
            --surface-light: #ffffff;
            --surface-muted: #f1f5f9;
            --text-main: #0f172a;
            --text-soft: #334155;
            --text-muted: #64748b;
            --border-light: #e2e8f0;
            --error: #ef4444;
            --error-bg: #fee2e2;
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.08);
            --radius-card: 20px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --primary: #0a0c10;
                --surface-light: #111827;
                --surface-muted: #1f2937;
                --text-main: #f1f5f9;
                --text-soft: #cbd5e1;
                --text-muted: #94a3b8;
                --border-light: #1e293b;
                --error-bg: #3b1416;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: var(--surface-muted);
            color: var(--text-main);
            line-height: 1.5;
        }

        .page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ================= HEADER ================= */
        .header {
            position: sticky;
            top: 0;
            z-index: 30;
            background: var(--surface-light);
            border-bottom: 1px solid var(--border-light);
            padding: 18px 20px;
            transition: box-shadow 0.2s ease;
        }

        .header.scrolled {
            box-shadow: var(--shadow-md);
        }

        .title {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #f59e0b);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 16px;
            letter-spacing: -0.3px;
        }

        /* Search box */
        .search-box {
            position: relative;
            max-width: 100%;
        }

        .search-box input {
            width: 100%;
            padding: 14px 48px 14px 18px;
            font-size: 1rem;
            border: 1px solid var(--border-light);
            border-radius: 48px;
            background: var(--surface-light);
            color: var(--text-main);
            transition: all 0.2s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.15);
        }

        .search-box input::placeholder {
            color: var(--text-muted);
        }

        .search-clear {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 32px;
            height: 32px;
            border-radius: 40px;
            background: var(--border-light);
            border: none;
            font-size: 16px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            transition: all 0.2s;
        }

        .search-clear:hover {
            background: var(--accent);
            color: white;
        }

        .search-clear.visible {
            display: flex;
        }

        /* ================= CONTAINER ================= */
        .container {
            max-width: 900px;
            margin: 24px auto;
            padding: 0 20px;
            width: 100%;
            flex: 1;
        }

        /* ================= LOADING ================= */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
            text-align: center;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-light);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 14px;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* ================= ERROR ================= */
        .error-message {
            background: var(--error-bg);
            border-left: 4px solid var(--error);
            padding: 12px 18px;
            border-radius: 12px;
            margin-bottom: 20px;
            color: var(--error);
            font-size: 0.9rem;
            display: none;
        }

        .error-message.visible {
            display: block;
        }

        /* ================= RESULTS COUNT ================= */
        .results-count {
            font-size: 0.8rem;
            font-weight: 500;
            padding: 6px 14px;
            background: var(--surface-light);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-radius: 40px;
            margin-bottom: 18px;
            color: var(--accent);
            border: 1px solid var(--border-light);
            display: none;
        }

        .results-count.visible {
            display: inline-flex;
        }

        .results-count::before {
            content: "📍";
            font-size: 0.85rem;
        }

        /* ================= CARD - FIXED LAYOUT (CRITICAL) ================= */
        .card {
            background: var(--surface-light);
            border-radius: var(--radius-card);
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid var(--border-light);
            transition: all 0.2s ease;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--accent);
        }

        /* Provinsi line */
        .provinsi {
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--text-main);
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--border-light);
            display: inline-block;
        }

        /* KOTA SECTION - FIXED WRAPPING & MULTI-LINE */
        .kota {
            font-size: 0.9rem;
            color: var(--text-soft);
            margin: 12px 0 14px 0;
            line-height: 1.6;
            word-break: break-word;
            white-space: normal;
            overflow-wrap: break-word;
            display: block;
        }

        /* City list wrapper - makes cities display as inline blocks with proper spacing */
        .city-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 8px 0 12px 0;
        }

        .city-tag {
            background: var(--surface-muted);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--text-soft);
            transition: all 0.15s;
            white-space: normal;
            word-break: keep-all;
        }

        .city-tag:hover {
            background: var(--accent);
            color: white;
        }

        /* Badge area */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: linear-gradient(115deg, var(--accent), var(--accent-dark));
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 700;
            color: white;
            margin-top: 6px;
        }

        .badge::before {
            content: "📡";
            font-size: 0.75rem;
        }

        /* Highlight mark */
        mark {
            background: #fed7aa;
            color: #9a3412;
            border-radius: 8px;
            padding: 2px 5px;
            font-weight: 600;
        }

        @media (prefers-color-scheme: dark) {
            mark {
                background: #f97316;
                color: #0c0a2a;
            }
            .city-tag {
                background: #1e293b;
            }
        }

        /* ================= NO RESULT ================= */
        #noResult {
            text-align: center;
            background: var(--surface-light);
            border-radius: 28px;
            padding: 48px 24px;
            margin-top: 30px;
            border: 1px solid var(--border-light);
            display: none;
        }

        #noResult.visible {
            display: block;
        }

        .no-result-icon {
            font-size: 56px;
            margin-bottom: 12px;
        }

        .no-result-text {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 6px;
        }

        .no-result-hint {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* ================= FOOTER ================= */
        .footer {
            margin-top: 48px;
            padding: 20px;
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border-light);
            background: var(--surface-light);
        }

        /* ================= WA BUTTON ================= */
        .wa-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 40;
        }

        .wa-float {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--success);
            padding: 12px 20px;
            border-radius: 60px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
            transition: all 0.2s ease;
        }

        .wa-float:hover {
            transform: scale(1.02);
            box-shadow: 0 15px 25px rgba(37, 211, 102, 0.4);
        }

        .wa-icon {
            width: 20px;
            height: 20px;
            fill: white;
        }

        /* ================= RESPONSIVE ================= */
        @media (max-width: 640px) {
            .container {
                padding: 0 16px;
            }
            .title {
                font-size: 1.3rem;
            }
            .card {
                padding: 16px;
            }
            .provinsi {
                font-size: 1.05rem;
            }
            .city-tag {
                font-size: 0.7rem;
                padding: 3px 10px;
            }
            .wa-float {
                padding: 10px 16px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="header" id="header">
            <div class="title">📡 Cek Area XL Akrab</div>
            <div class="search-box" role="search">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Cari provinsi atau kota..."
                    aria-label="Cari provinsi atau kota"
                    autocomplete="off"
                >
                <button class="search-clear" id="searchClear" aria-label="Hapus">✕</button>
            </div>
        </div>

        <div class="container">
            <div class="error-message" id="errorMessage" role="alert"></div>
            <div class="results-count" id="resultsCount"></div>
            <div class="loading" id="loadingState">
                <div class="spinner"></div>
                <div class="loading-text">Memuat data area XL Akrab...</div>
            </div>
            <div id="dataContainer"></div>
            <div id="noResult" role="status">
                <div class="no-result-icon">🔍</div>
                <div class="no-result-text">Wilayah tidak ditemukan</div>
                <div class="no-result-hint">Coba cari dengan kata kunci lain</div>
            </div>
        </div>

        <div class="footer">
            <p>© 2026 AXXO STORE — Cakupan XL Akrab se-Indonesia</p>
        </div>
    </div>

    <div class="wa-container">
        <a 
            href="https://wa.me/6283865626030?text=Halo%20Admin,%20saya%20ingin%20order%20Paket%20XL%20Akrab"
            target="_blank"
            rel="noopener noreferrer"
            class="wa-float"
            aria-label="Chat via WhatsApp"
        >
            <svg class="wa-icon" viewBox="0 0 32 32" aria-hidden="true">
                <path d="M19.11 17.53c-.27-.14-1.6-.79-1.85-.88-.25-.09-.43-.14-.61.14-.18.27-.7.88-.86 1.06-.16.18-.32.2-.59.07-.27-.14-1.14-.42-2.18-1.34-.81-.72-1.36-1.61-1.52-1.88-.16-.27-.02-.42.12-.56.13-.13.27-.33.4-.5.14-.16.18-.27.27-.45.09-.18.05-.33-.02-.46-.07-.13-.61-1.47-.84-2.01-.22-.53-.45-.46-.61-.46-.15 0-.33-.02-.5-.02-.17 0-.44.06-.67.31-.24.25-.9.88-.9 2.14 0 1.26.92 2.48 1.05 2.65.13.17 1.84 2.81 4.46 3.94.62.27 1.1.43 1.48.56.62.2 1.19.17 1.64.1.5-.08 1.54-.63 1.75-1.23.21-.6.21-1.12.15-1.23-.07-.11-.24-.17-.5-.3z"/>
            </svg>
            <span>Order via WA</span>
        </a>
    </div>

    <script>
        // CONFIGURATION
        const CONFIG = {
            DATA_URL: 'data.json',
            DEBOUNCE_DELAY: 300,
            SCROLL_THRESHOLD: 20,
        };

        let state = {
            allData: [],
            isLoading: true,
        };

        const elements = {
            searchInput: document.getElementById('searchInput'),
            searchClear: document.getElementById('searchClear'),
            dataContainer: document.getElementById('dataContainer'),
            noResult: document.getElementById('noResult'),
            resultsCount: document.getElementById('resultsCount'),
            loadingState: document.getElementById('loadingState'),
            errorMessage: document.getElementById('errorMessage'),
            header: document.getElementById('header'),
        };

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showError(message) {
            elements.errorMessage.textContent = `⚠️ ${message}`;
            elements.errorMessage.classList.add('visible');
        }

        function hideError() {
            elements.errorMessage.classList.remove('visible');
        }

        function highlight(text, keyword) {
            if (!keyword) return escapeHtml(text);
            const safe = keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp(`(${safe})`, 'gi');
            const escaped = escapeHtml(text);
            return escaped.replace(regex, '<mark>$1</mark>');
        }

        // NEW: Split kota string into array of cities for better layout
        function parseCityList(kotaString) {
            // Handle cases like "Kota Probolinggo, Kab. Bangkalan, Kab. Sidoarjo, ..."
            // Split by comma and trim each part
            if (!kotaString) return [];
            const cities = kotaString.split(',').map(c => c.trim()).filter(c => c.length > 0);
            return cities;
        }

        // Render cards with improved city list as tags
        function renderCards(data, keyword = '') {
            const container = elements.dataContainer;
            container.innerHTML = '';

            if (data.length === 0) {
                elements.noResult.classList.add('visible');
                elements.resultsCount.classList.remove('visible');
                return;
            }

            elements.noResult.classList.remove('visible');
            elements.resultsCount.classList.add('visible');
            elements.resultsCount.textContent = `${data.length} area ditemukan`;

            const fragment = document.createDocumentFragment();

            data.forEach((item) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.setAttribute('tabindex', '0');
                
                // Parse cities into array for better layout
                const cityArray = parseCityList(item.kota);
                const highlightedProvinsi = highlight(item.provinsi, keyword);
                
                // Build cities HTML with proper wrapping (each city as separate tag)
                let citiesHtml = '';
                if (cityArray.length > 0) {
                    citiesHtml = '<div class="city-list">';
                    cityArray.forEach(city => {
                        const highlightedCity = highlight(city, keyword);
                        citiesHtml += `<span class="city-tag">${highlightedCity}</span>`;
                    });
                    citiesHtml += '</div>';
                } else {
                    // Fallback: if no commas, show as normal text
                    const highlightedKota = highlight(item.kota, keyword);
                    citiesHtml = `<div class="kota">${highlightedKota}</div>`;
                }

                card.innerHTML = `
                    <div class="provinsi">${highlightedProvinsi}</div>
                    ${citiesHtml}
                    <span class="badge">${escapeHtml(item.area)}</span>
                `;
                
                fragment.appendChild(card);
            });

            container.appendChild(fragment);
            hideError();
        }

        // Filter function
        function filterData(keyword) {
            if (!keyword.trim()) {
                renderCards(state.allData);
                elements.searchClear.classList.remove('visible');
                return;
            }
            elements.searchClear.classList.add('visible');
            const lowerKeyword = keyword.toLowerCase();
            const filtered = state.allData.filter(item =>
                item.provinsi.toLowerCase().includes(lowerKeyword) ||
                item.kota.toLowerCase().includes(lowerKeyword)
            );
            renderCards(filtered, keyword);
        }

        function debounce(func, delay) {
            let timeoutId;
            return function (...args) {
                clearTimeout(timeoutId);
                timeoutId = setTimeout(() => func.apply(this, args), delay);
            };
        }

        const debouncedSearch = debounce(function (event) {
            const input = event.target.value.trim().toLowerCase();
            filterData(input);
        }, CONFIG.DEBOUNCE_DELAY);

        function initSearchListeners() {
            elements.searchInput.addEventListener('input', debouncedSearch);
            elements.searchClear.addEventListener('click', () => {
                elements.searchInput.value = '';
                elements.searchInput.focus();
                filterData('');
            });
            elements.searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    elements.searchInput.value = '';
                    filterData('');
                }
            });
            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === '/') {
                    e.preventDefault();
                    elements.searchInput.focus();
                }
            });
        }

        async function loadData() {
            try {
                elements.loadingState.style.display = 'flex';
                hideError();
                const response = await fetch(CONFIG.DATA_URL);
                if (!response.ok) throw new Error(`HTTP ${response.status} — data tidak tersedia`);
                const data = await response.json();
                if (!Array.isArray(data)) throw new Error('Format data salah');

                state.allData = data;
                state.isLoading = false;
                elements.loadingState.style.display = 'none';
                renderCards(data);
                initSearchListeners();
            } catch (error) {
                state.isLoading = false;
                elements.loadingState.style.display = 'none';
                console.error('Load error:', error);
                showError(`Gagal memuat data: ${error.message}. Pastikan file data.json tersedia.`);
                elements.dataContainer.innerHTML = '';
                elements.noResult.classList.add('visible');
                const noResultDiv = document.getElementById('noResult');
                if (noResultDiv) {
                    const hintSpan = noResultDiv.querySelector('.no-result-hint');
                    if (hintSpan) hintSpan.innerHTML = '⚠️ Tidak dapat terhubung ke server data.';
                }
            }
        }

        // Scroll effect
        let lastScrollY = 0;
        window.addEventListener('scroll', () => {
            const currentScrollY = window.scrollY;
            if (Math.abs(currentScrollY - lastScrollY) > 2) {
                elements.header.classList.toggle('scrolled', currentScrollY > CONFIG.SCROLL_THRESHOLD);
                lastScrollY = currentScrollY;
            }
        }, { passive: true });

        loadData();
    </script>
</body>
</html>
