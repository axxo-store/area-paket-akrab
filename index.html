<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Cek area coverage paket XL Akrab di seluruh Indonesia">
    <meta name="theme-color" content="#2563eb">
    <title>Cek Area XL Akrab</title>

    <style>
        /* ================= ROOT THEME ================= */
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --success: #25D366;

            /* LIGHT MODE */
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
            --subtext: #64748b;
            --border: #e2e8f0;
            --error: #ef4444;

            /* Animations */
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 🌙 AUTO DARK MODE */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #020617;
                --card: #0f172a;
                --text: #e2e8f0;
                --subtext: #94a3b8;
                --border: #1e293b;
            }
        }

        /* ================= RESET ================= */
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background var(--transition), color var(--transition);
        }

        /* Respect reduced motion preferences */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* ================= LAYOUT ================= */
        .page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ================= HEADER ================= */
        .header {
            position: sticky;
            top: 0;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            padding: 15px;
            border-bottom: none;
            z-index: 10;
            color: white;
            box-shadow: none;
            transition: box-shadow var(--transition);
        }

        .header.scrolled {
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
        }

        /* TITLE */
        .title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 10px;
            color: white;
        }

        /* SEARCH CONTAINER */
        .search-box {
            margin-top: 10px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 40px 12px 12px;
            border-radius: 10px;
            border: none;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            backdrop-filter: blur(6px);
            transition: background var(--transition);
            font-family: inherit;
        }

        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .search-box input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.25);
        }

        /* Clear button */
        .search-clear {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.3);
            border: none;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            display: none;
            align-items: center;
            justify-content: center;
            transition: background var(--transition);
            padding: 0;
        }

        .search-clear:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        .search-clear:focus {
            outline: 2px solid white;
            outline-offset: 2px;
        }

        .search-clear.visible {
            display: flex;
        }

        /* ================= CONTAINER ================= */
        .container {
            max-width: 900px;
            margin: auto;
            padding: 16px;
            flex: 1;
            width: 100%;
        }

        /* ================= LOADING STATE ================= */
        .loading {
            text-align: center;
            padding: 40px 16px;
        }

        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            margin-top: 10px;
            color: var(--subtext);
            font-size: 14px;
        }

        /* ================= ERROR STATE ================= */
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 16px;
            border-left: 4px solid var(--error);
            display: none;
        }

        .error-message.visible {
            display: block;
        }

        /* ================= CARD (NEW FLEX LAYOUT) ================= */
        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 14px;
            border: 1px solid var(--border);
            transition: var(--transition);
            cursor: pointer;
            
            /* Flexbox for right-middle badge */
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        }

        .card:focus {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        /* Left content (provinsi + kota) */
        .card-content {
            flex: 1;
            min-width: 0; /* Prevents overflow */
        }

        /* TEXT */
        .provinsi {
            font-weight: 800;
            font-size: 16px;
            margin-bottom: 4px;
        }

        .kota {
            font-size: 13.5px;
            color: var(--subtext);
            line-height: 1.5;
            word-break: break-word;
        }

        /* BADGE - now on the right, vertically centered */
        .badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.3px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.25);
            transition: all var(--transition);
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* HIGHLIGHT */
        mark {
            background: #fde68a;
            border-radius: 4px;
            padding: 2px 4px;
            font-weight: 600;
        }

        /* NO RESULT */
        #noResult {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            display: none;
        }

        #noResult.visible {
            display: block;
        }

        .no-result-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .no-result-text {
            color: var(--error);
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .no-result-hint {
            color: var(--subtext);
            font-size: 14px;
        }

        /* RESULTS COUNT */
        .results-count {
            padding: 8px 0;
            margin-bottom: 16px;
            color: var(--subtext);
            font-size: 13px;
            display: none;
        }

        .results-count.visible {
            display: block;
        }

        /* ================= FOOTER ================= */
        .footer {
            margin-top: auto;
            padding: 20px;
            text-align: center;
            font-size: 12px;
            color: var(--subtext);
            border-top: 1px solid var(--border);
        }

        /* ================= WA BUTTON ================= */
        .wa-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9;
        }

        .wa-float {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background: var(--success);
            border-radius: 999px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            transition: var(--transition);
            border: none;
            cursor: pointer;
            font-size: 14px;
        }

        .wa-float:hover,
        .wa-float:focus {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        }

        .wa-float:focus {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        .wa-icon {
            width: 20px;
            height: 20px;
            fill: white;
            flex-shrink: 0;
        }

        /* ================= RESPONSIVE ================= */
        @media (max-width: 640px) {
            .title {
                font-size: 16px;
            }

            .container {
                padding: 12px;
            }

            .card {
                padding: 12px;
                margin-bottom: 10px;
                flex-wrap: wrap;
            }

            .provinsi {
                font-size: 15px;
            }

            .badge {
                white-space: normal;
                font-size: 11px;
                padding: 4px 10px;
            }

            .wa-float {
                padding: 10px 14px;
                font-size: 13px;
                gap: 8px;
            }

            .wa-icon {
                width: 18px;
                height: 18px;
            }
        }
    </style>
</head>

<body>
    <div class="page">
        <!-- HEADER -->
        <div class="header" id="header">
            <div class="title">Cek Area Paket XL Akrab</div>
            <div class="search-box" role="search">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="⌕ Cari provinsi / kota..."
                    aria-label="Cari provinsi atau kota"
                    autocomplete="off"
                    spellcheck="false"
                >
                <button 
                    class="search-clear" 
                    id="searchClear" 
                    aria-label="Hapus pencarian"
                    title="Tekan Escape untuk menghapus"
                >
                    ✕
                </button>
            </div>
        </div>

        <!-- CONTENT -->
        <div class="container">
            <!-- Error Message -->
            <div class="error-message" id="errorMessage" role="alert"></div>

            <!-- Results Count -->
            <div class="results-count" id="resultsCount"></div>

            <!-- Loading State -->
            <div class="loading" id="loadingState">
                <div class="spinner"></div>
                <div class="loading-text">Memuat data...</div>
            </div>

            <!-- Data Container -->
            <div id="dataContainer"></div>

            <!-- No Results -->
            <div id="noResult" role="status" aria-live="polite">
                <div class="no-result-icon">🔍</div>
                <div class="no-result-text">Wilayah tidak ditemukan</div>
                <div class="no-result-hint">Coba cari dengan kata kunci lain</div>
            </div>
        </div>

        <!-- FOOTER -->
        <div class="footer">
            <p>©2026 AXXO STORE</p>
        </div>
    </div>

    <!-- WA BUTTON -->
    <div class="wa-container">
        <a 
            href="https://wa.me/6283865626030?text=Halo%20Admin,%20saya%20ingin%20order%20Paket%20XL%20Akrab"
            target="_blank"
            rel="noopener noreferrer"
            class="wa-float"
            aria-label="Chat admin via WhatsApp"
        >
            <svg class="wa-icon" viewBox="0 0 32 32" aria-hidden="true">
                <path d="M19.11 17.53c-.27-.14-1.6-.79-1.85-.88-.25-.09-.43-.14-.61.14-.18.27-.7.88-.86 1.06-.16.18-.32.2-.59.07-.27-.14-1.14-.42-2.18-1.34-.81-.72-1.36-1.61-1.52-1.88-.16-.27-.02-.42.12-.56.13-.13.27-.33.4-.5.14-.16.18-.27.27-.45.09-.18.05-.33-.02-.46-.07-.13-.61-1.47-.84-2.01-.22-.53-.45-.46-.61-.46-.15 0-.33-.02-.5-.02-.17 0-.44.06-.67.31-.24.25-.9.88-.9 2.14 0 1.26.92 2.48 1.05 2.65.13.17 1.84 2.81 4.46 3.94.62.27 1.1.43 1.48.56.62.2 1.19.17 1.64.1.5-.08 1.54-.63 1.75-1.23.21-.6.21-1.12.15-1.23-.07-.11-.24-.17-.5-.3z"/>
            </svg>
        </a>
    </div>

    <script>
        /* ================= CONFIG ================= */
        const CONFIG = {
            DATA_URL: 'data.json',
            DEBOUNCE_DELAY: 300,
            SCROLL_THRESHOLD: 20,
        };

        /* ================= STATE ================= */
        let state = {
            allData: [],
            isLoading: true,
            hasError: false,
        };

        /* ================= DOM ELEMENTS ================= */
        const elements = {
            searchInput: document.getElementById('searchInput'),
            searchClear: document.getElementById('searchClear'),
            dataContainer: document.getElementById('dataContainer'),
            noResult: document.getElementById('noResult'),
            resultsCount: document.getElementById('resultsCount'),
            loadingState: document.getElementById('loadingState'),
            errorMessage: document.getElementById('errorMessage'),
            header: document.getElementById('header'),
        };

        /* ================= UTILITIES ================= */

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function debounce(func, delay) {
            let timeoutId;
            return function (...args) {
                clearTimeout(timeoutId);
                timeoutId = setTimeout(() => func.apply(this, args), delay);
            };
        }

        function showError(message) {
            elements.errorMessage.textContent = message;
            elements.errorMessage.classList.add('visible');
            state.hasError = true;
        }

        function hideError() {
            elements.errorMessage.classList.remove('visible');
            state.hasError = false;
        }

        function highlight(text, keyword) {
            if (!keyword) return escapeHtml(text);
            const safe = keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp(`(${safe})`, 'gi');
            const escaped = escapeHtml(text);
            return escaped.replace(regex, '<mark>$1</mark>');
        }

        /* ================= RENDER ================= */

        function renderCards(data, keyword = '') {
            const container = elements.dataContainer;
            container.innerHTML = '';

            if (data.length === 0) {
                elements.noResult.classList.add('visible');
                elements.resultsCount.classList.remove('visible');
                return;
            }

            elements.noResult.classList.remove('visible');
            elements.resultsCount.classList.add('visible');
            elements.resultsCount.textContent = `Ditemukan ${data.length} hasil`;

            const fragment = document.createDocumentFragment();

            data.forEach((item) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.setAttribute('tabindex', '0');
                card.setAttribute('role', 'article');
                card.setAttribute('aria-label', `${item.provinsi}, ${item.kota}`);

                // New structure: left content div + badge on the right
                card.innerHTML = `
                    <div class="card-content">
                        <div class="provinsi">${highlight(item.provinsi, keyword)}</div>
                        <div class="kota">${highlight(item.kota, keyword)}</div>
                    </div>
                    <span class="badge">${escapeHtml(item.area)}</span>
                `;

                fragment.appendChild(card);
            });

            container.appendChild(fragment);
            hideError();
        }

        /* ================= SEARCH ================= */

        function filterData(keyword) {
            if (!keyword.trim()) {
                renderCards(state.allData);
                elements.searchClear.classList.remove('visible');
                return;
            }

            elements.searchClear.classList.add('visible');

            const filtered = state.allData.filter(item =>
                item.provinsi.toLowerCase().includes(keyword) ||
                item.kota.toLowerCase().includes(keyword)
            );

            renderCards(filtered, keyword);
        }

        const debouncedSearch = debounce(function (event) {
            const input = event.target.value.trim().toLowerCase();
            filterData(input);
        }, CONFIG.DEBOUNCE_DELAY);

        function initSearchListeners() {
            elements.searchInput.addEventListener('input', debouncedSearch);

            elements.searchClear.addEventListener('click', () => {
                elements.searchInput.value = '';
                elements.searchInput.focus();
                filterData('');
            });

            elements.searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    elements.searchInput.value = '';
                    filterData('');
                }
            });

            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === '/') {
                    e.preventDefault();
                    elements.searchInput.focus();
                }
            });
        }

        /* ================= DATA LOADING ================= */

        async function loadData() {
            try {
                elements.loadingState.style.display = 'block';
                hideError();

                const response = await fetch(CONFIG.DATA_URL);

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();

                if (!Array.isArray(data)) {
                    throw new Error('Data harus berupa array');
                }

                state.allData = data;
                state.isLoading = false;
                elements.loadingState.style.display = 'none';

                renderCards(data);
                initSearchListeners();
            } catch (error) {
                state.isLoading = false;
                elements.loadingState.style.display = 'none';

                console.error('Error loading data:', error);
                showError(`⚠️ Gagal memuat data: ${error.message}`);

                elements.dataContainer.innerHTML = '';
                elements.noResult.classList.add('visible');
            }
        }

        /* ================= SCROLL ANIMATION ================= */

        let lastScrollY = 0;
        const scrollListener = () => {
            const currentScrollY = window.scrollY;

            if (Math.abs(currentScrollY - lastScrollY) > 2) {
                elements.header.classList.toggle(
                    'scrolled',
                    currentScrollY > CONFIG.SCROLL_THRESHOLD
                );
                lastScrollY = currentScrollY;
            }
        };

        window.addEventListener('scroll', scrollListener, { passive: true });

        /* ================= INIT ================= */
        loadData();
    </script>
</body>
</html>
