<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cek Area XL Akrab</title>

<style>
:root {
    --primary: #2563eb;
    --bg: #0f172a;
    --card: rgba(255,255,255,0.05);
    --text: #e2e8f0;
    --border: rgba(255,255,255,0.08);
}

/* FIX IMPORTANT */
* {
    box-sizing: border-box;
}

html, body {
    margin: 0;
    font-family: system-ui, sans-serif;
    background: linear-gradient(135deg, #020617, #0f172a);
    color: var(--text);
    min-height: 100%;
}

/* LAYOUT */
.page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* HEADER */
.header {
    position: sticky;
    top: 10px;
    margin: 10px;
    border-radius: 18px;
    padding: 15px;
    backdrop-filter: blur(12px);
    background: rgba(15,23,42,0.6);
    border: 1px solid rgba(255,255,255,0.1);
    z-index: 10;
    transition: all 0.3s ease;
}

.header.scrolled {
    padding: 10px 15px;
    box-shadow: 0 6px 16px rgba(0,0,0,0.2);
}

.title {
    font-size: 20px;
    font-weight: 800;
    margin-bottom: 10px;
    transition: 0.3s;
}

.header.scrolled .title {
    font-size: 16px;
}

/* SEARCH FIX */
.search-box {
    width: 100%;
}

.search-box input {
    width: 100%;
    display: block;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1px solid var(--border);
    font-size: 14px;
    background: rgba(255,255,255,0.05);
    color: var(--text);
}

.search-box input:focus {
    outline: none;
    border-color: var(--primary);
}

/* CONTAINER */
.container {
    max-width: 900px;
    margin: auto;
    padding: 15px;
    flex: 1;
}

/* CARD */
.card {
    background: var(--card);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 14px;
    border: 1px solid var(--border);
    backdrop-filter: blur(6px);
    transition: 0.2s;
    will-change: transform;
}

.card:hover {
    transform: translateY(-3px);
}

/* TEXT */
.provinsi {
    font-weight: 700;
    margin-bottom: 6px;
}

.kota {
    font-size: 13.5px;
    opacity: 0.8;
    margin-bottom: 10px;
}

/* BADGE */
.badge {
    display: inline-block;
    padding: 5px 12px;
    border-radius: 999px;
    background: var(--primary);
    color: white;
    font-size: 11px;
}

/* HIGHLIGHT */
mark {
    background: #facc15;
    color: black;
    border-radius: 4px;
}

/* NO RESULT */
#noResult {
    text-align: center;
    margin-top: 20px;
    color: #f87171;
    display: none;
}

/* FOOTER */
.footer {
    margin-top: auto;
    padding: 20px 0;
    text-align: center;
    font-size: 12px;
    opacity: 0.5;
}

/* WA BUTTON */
.wa-container {
    position: fixed;
    bottom: 20px;
    right: 20px;
}

.wa-float {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: #25D366;
    border-radius: 999px;
    color: white;
    text-decoration: none;
    font-weight: 600;
    animation: float 2s ease-in-out infinite;
}

.wa-float:hover {
    transform: scale(1.05);
}

.wa-icon {
    width: 22px;
    fill: white;
}

/* ANIMATION */
@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
}
</style>
</head>

<body>

<div class="page">

<div class="header">
    <div class="title">Cek Area Paket XL Akrab</div>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Cari provinsi / kota..." onkeyup="filterCards()">
    </div>
</div>

<div class="container">
    <div id="dataContainer"></div>
    <p id="noResult">Wilayah tidak ditemukan</p>
</div>

<div class="footer">©2026 AXXO STORE</div>

</div>

<!-- WA BUTTON -->
<div class="wa-container">
<a href="https://wa.me/6283865626030?text=Halo%20Admin,%20saya%20ingin%20order%20Paket%20XL%20Akrab" target="_blank" class="wa-float">
    <svg class="wa-icon" viewBox="0 0 32 32">
        <path d="M19.11 17.53c-.27-.14-1.6-.79-1.85-.88-.25-.09-.43-.14-.61.14-.18.27-.7.88-.86 1.06-.16.18-.32.2-.59.07-.27-.14-1.14-.42-2.18-1.34-.81-.72-1.36-1.61-1.52-1.88-.16-.27-.02-.42.12-.56.13-.13.27-.32.41-.48.14-.16.18-.27.27-.45.09-.18.05-.34-.02-.48-.07-.14-.61-1.47-.84-2.01-.22-.53-.45-.46-.61-.47-.16-.01-.34-.01-.52-.01-.18 0-.48.07-.73.34-.25.27-.95.93-.95 2.26 0 1.32.97 2.6 1.11 2.78.14.18 1.92 2.93 4.66 4.11.65.28 1.15.45 1.54.58.65.21 1.24.18 1.71.11.52-.08 1.6-.65 1.83-1.28.23-.63.23-1.17.16-1.28-.07-.11-.25-.18-.52-.32z"/>
    </svg>
    <span>Order</span>
</a>
</div>

<script>
let allData = [];

/* FETCH DATA */
fetch('data.json')
.then(res => res.json())
.then(data => {
    allData = data;
    renderCards(data);
});

/* RENDER FAST */
function renderCards(data, keyword = '') {
    const container = document.getElementById('dataContainer');

    let html = '';

    for (let i = 0; i < data.length; i++) {
        const item = data[i];

        html += `
        <div class="card">
            <div class="provinsi">${keyword ? highlight(item.provinsi, keyword) : item.provinsi}</div>
            <div class="kota">${keyword ? highlight(item.kota, keyword) : item.kota}</div>
            <span class="badge">${item.area}</span>
        </div>`;
    }

    container.innerHTML = html;
}

/* SAFE HIGHLIGHT */
function highlight(text, keyword) {
    const safe = keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return text.replace(new RegExp(`(${safe})`, 'gi'), '<mark>$1</mark>');
}

/* ⚡ INSTANT SEARCH */
document.getElementById('searchInput').addEventListener('input', function () {
    const input = this.value.trim().toLowerCase();

    if (!input) {
        renderCards(allData);
        document.getElementById('noResult').style.display = 'none';
        return;
    }

    const filtered = [];

    for (let i = 0; i < allData.length; i++) {
        const item = allData[i];

        if (
            item.provinsi.toLowerCase().includes(input) ||
            item.kota.toLowerCase().includes(input)
        ) {
            filtered.push(item);
        }
    }

    renderCards(filtered, input);

    document.getElementById('noResult').style.display =
        filtered.length === 0 ? 'block' : 'none';
});

/* HEADER ANIMATION */
window.addEventListener('scroll', () => {
    document.querySelector('.header')
        .classList.toggle('scrolled', window.scrollY > 20);
});
</script>

</body>
</html>
