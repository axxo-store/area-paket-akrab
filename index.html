<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Cek area coverage paket XL Akrab di seluruh Indonesia - Cepat, akurat, dan mudah digunakan">
    <meta name="theme-color" content="#2563eb">
    <meta name="color-scheme" content="light dark">
    <link rel="icon" type="image/png" href="webicon.png">
    <title>Cek Area XL Akrab</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #3b82f6;
            --success: #25D366;
            --success-dark: #128C7E;
            
            /* Light mode */
            --bg: #f8fafc;
            --bg-secondary: #f1f5f9;
            --card: #ffffff;
            --text: #0f172a;
            --text-secondary: #475569;
            --subtext: #64748b;
            --border: #e2e8f0;
            --border-light: #f1f5f9;
            --error: #ef4444;
            --error-bg: #fef2f2;
            --mark-bg: #fef08a;
            --mark-text: #854d0e;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --transition-fast: 0.15s ease;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #020617;
                --bg-secondary: #0f172a;
                --card: #0f172a;
                --text: #f1f5f9;
                --text-secondary: #cbd5e1;
                --subtext: #94a3b8;
                --border: #1e293b;
                --border-light: #334155;
                --mark-bg: #854d0e;
                --mark-text: #fef08a;
                --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.3);
                --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.4);
                --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.5);
            }
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            transition: background var(--transition), color var(--transition);
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Layout */
        .page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            padding: 1rem 1rem 1.25rem;
            z-index: 20;
            color: white;
            transition: box-shadow var(--transition-fast), padding var(--transition-fast);
        }

        .header.scrolled {
            padding: 0.75rem 1rem 1rem;
            box-shadow: var(--shadow-lg);
        }

        .title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.125rem;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .title-icon {
            width: 1.5rem;
            height: 1.5rem;
            object-fit: contain;
            filter: drop-shadow(0 1px 2px rgba(0,0,0,0.2));
        }

        /* Search Box */
        .search-wrapper {
            margin-top: 0.875rem;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 0.75rem 2.5rem 0.75rem 1rem;
            border-radius: 0.75rem;
            border: none;
            font-size: 0.9375rem;
            background: rgba(255, 255, 255, 0.12);
            color: white;
            backdrop-filter: blur(8px);
            transition: all var(--transition-fast);
            font-family: inherit;
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .search-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 0 2px rgba(255,255,255,0.3);
        }

        .search-clear {
            position: absolute;
            right: 0.625rem;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.25);
            border: none;
            color: white;
            width: 1.75rem;
            height: 1.75rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 1rem;
            display: none;
            align-items: center;
            justify-content: center;
            transition: background var(--transition-fast);
        }

        .search-clear:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        .search-clear:focus-visible {
            outline: 2px solid white;
            outline-offset: 2px;
        }

        .search-clear.visible {
            display: flex;
        }

        /* Search Shortcut - Desktop only */
        .search-shortcut {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-top: 0.5rem;
            text-align: right;
        }
        
        /* Hide on mobile by default */
        .search-shortcut {
            display: none;
        }
        
        /* Show only on desktop (min-width: 768px) */
        @media (min-width: 768px) {
            .search-shortcut {
                display: block;
            }
        }

        /* Container */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 1.25rem 1rem;
            flex: 1;
            width: 100%;
        }

        /* Loading State */
        .loading-state {
            text-align: center;
            padding: 3rem 1rem;
        }

        .spinner {
            display: inline-block;
            width: 2rem;
            height: 2rem;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 0.75rem;
            color: var(--subtext);
            font-size: 0.875rem;
        }

        /* Error Message */
        .error-message {
            background: var(--error-bg);
            color: var(--error);
            padding: 0.875rem 1rem;
            border-radius: 0.75rem;
            margin-bottom: 1rem;
            border-left: 4px solid var(--error);
            display: none;
            font-size: 0.875rem;
        }

        .error-message.visible {
            display: block;
        }

        /* Results Count - Only shown during search */
        .results-count {
            padding: 0.5rem 0;
            margin-bottom: 1rem;
            color: var(--subtext);
            font-size: 0.8125rem;
            display: none;
            border-bottom: 1px solid var(--border-light);
        }

        .results-count.visible {
            display: block;
        }

        /* Cards */
        .cards-grid {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .card {
            background: var(--card);
            border-radius: 1rem;
            padding: 1rem;
            border: 1px solid var(--border);
            transition: all var(--transition);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--primary-light);
        }

        .card:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        .card-content {
            flex: 1;
            min-width: 0;
        }

        .provinsi {
            font-weight: 800;
            font-size: 1rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .provinsi::before {
            content: "";
            display: inline-block;
            width: 4px;
            height: 1.125rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 4px;
            flex-shrink: 0;
        }

        .kota {
            font-size: 0.8125rem;
            color: var(--text-secondary);
            line-height: 1.4;
            word-break: break-word;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.375rem 0.875rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.01em;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: var(--shadow-sm);
            white-space: nowrap;
            flex-shrink: 0;
        }

        mark {
            background: var(--mark-bg);
            color: var(--mark-text);
            border-radius: 0.25rem;
            padding: 0.125rem 0.25rem;
            font-weight: 600;
        }

        /* No Result */
        .no-result {
            text-align: center;
            padding: 3rem 1rem;
            display: none;
        }

        .no-result.visible {
            display: block;
        }

        .no-result-icon {
            font-size: 3rem;
            margin-bottom: 0.75rem;
            opacity: 0.7;
        }

        .no-result-text {
            color: var(--error);
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .no-result-hint {
            color: var(--subtext);
            font-size: 0.8125rem;
        }

        /* Footer */
        .footer {
            margin-top: auto;
            padding: 1.5rem;
            text-align: center;
            font-size: 0.75rem;
            color: var(--subtext);
            border-top: 1px solid var(--border);
        }

        /* WhatsApp Button - Enhanced */
        .wa-container {
            position: fixed;
            bottom: 1.25rem;
            right: 1.25rem;
            z-index: 30;
        }

        .wa-float {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.625rem 1rem;
            background: var(--success);
            border-radius: 999px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.8125rem;
            box-shadow: var(--shadow-lg);
            transition: all var(--transition);
            border: none;
            cursor: pointer;
        }

        .wa-float:hover {
            transform: translateY(-2px) scale(1.02);
            background: var(--success-dark);
            box-shadow: 0 20px 25px -12px rgba(0, 0, 0, 0.3);
        }

        .wa-float:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        .wa-icon {
            width: 1.375rem;
            height: 1.375rem;
            fill: white;
        }

        @media (max-width: 480px) {
            .wa-float span {
                display: inline;
            }
            .wa-float {
                padding: 0.5rem 0.875rem;
            }
        }

        /* Responsive */
        @media (max-width: 640px) {
            .title {
                font-size: 1rem;
            }
            .title-icon {
                width: 1.25rem;
                height: 1.25rem;
            }
            .container {
                padding: 1rem;
            }
            .card {
                padding: 0.875rem;
            }
            .provinsi {
                font-size: 0.9375rem;
            }
            .badge {
                font-size: 0.6875rem;
                padding: 0.25rem 0.75rem;
            }
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--subtext);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }
    </style>
</head>

<body>
    <div class="page">
        <div class="header" id="header">
            <div class="title">
                <img src="satellite.png" alt="Satellite Icon" class="title-icon" loading="lazy">
                <span>Cek Area Paket XL Akrab</span>
            </div>
            <div class="search-wrapper">
                <input 
                    type="text" 
                    id="searchInput" 
                    class="search-input"
                    placeholder="Cari provinsi atau kota..."
                    aria-label="Cari provinsi atau kota"
                    autocomplete="off"
                    spellcheck="false"
                >
                <button 
                    class="search-clear" 
                    id="searchClear" 
                    aria-label="Hapus pencarian"
                    title="Tekan Escape untuk menghapus"
                >
                    ✕
                </button>
            </div>
            <div class="search-shortcut" id="searchShortcut">
                ⚡ Tekan <kbd style="background: rgba(255,255,255,0.2); padding: 0.125rem 0.375rem; border-radius: 4px;">Ctrl+/</kbd> untuk fokus pencarian
            </div>
        </div>

        <div class="container">
            <div class="error-message" id="errorMessage" role="alert"></div>
            <div class="results-count" id="resultsCount"></div>
            <div class="loading-state" id="loadingState">
                <div class="spinner"></div>
                <div class="loading-text">Memuat data...</div>
            </div>
            <div id="dataContainer" class="cards-grid"></div>
            <div class="no-result" id="noResult" role="status" aria-live="polite">
                <div class="no-result-icon">🔍</div>
                <div class="no-result-text">Wilayah tidak ditemukan</div>
                <div class="no-result-hint">Coba cari dengan kata kunci lain atau cek ejaan</div>
            </div>
        </div>

        <div class="footer">
            <p>&copy; 2026 AXXO STORE</p>
        </div>
    </div>

    <div class="wa-container">
        <a 
            href="https://wa.me/6283865626030?text=Halo%20Admin,%20saya%20ingin%20order%20Paket%20XL%20Akrab"
            target="_blank"
            rel="noopener noreferrer"
            class="wa-float"
            aria-label="Chat admin via WhatsApp untuk order paket XL Akrab"
        >
            <svg class="wa-icon" viewBox="0 0 32 32" aria-hidden="true" focusable="false">
                <path d="M19.11 17.53c-.27-.14-1.6-.79-1.85-.88-.25-.09-.43-.14-.61.14-.18.27-.7.88-.86 1.06-.16.18-.32.2-.59.07-.27-.14-1.14-.42-2.18-1.34-.81-.72-1.36-1.61-1.52-1.88-.16-.27-.02-.42.12-.56.13-.13.27-.33.4-.5.14-.16.18-.27.27-.45.09-.18.05-.33-.02-.46-.07-.13-.61-1.47-.84-2.01-.22-.53-.45-.46-.61-.46-.15 0-.33-.02-.5-.02-.17 0-.44.06-.67.31-.24.25-.9.88-.9 2.14 0 1.26.92 2.48 1.05 2.65.13.17 1.84 2.81 4.46 3.94.62.27 1.1.43 1.48.56.62.2 1.19.17 1.64.1.5-.08 1.54-.63 1.75-1.23.21-.6.21-1.12.15-1.23-.07-.11-.24-.17-.5-.3z"/>
            </svg>
            <span>Order via WA</span>
        </a>
    </div>

    <script>
        // ================= CONFIGURATION =================
        const CONFIG = {
            DATA_URL: 'data.json',
            DEBOUNCE_DELAY: 250,
            SCROLL_THRESHOLD: 10,
            CACHE_TIME: 1000 * 60 * 5,
        };

        // ================= STATE MANAGEMENT =================
        let state = {
            allData: [],
            isLoading: true,
            hasError: false,
            searchQuery: ''
        };

        // DOM Elements cache
        const elements = {
            searchInput: document.getElementById('searchInput'),
            searchClear: document.getElementById('searchClear'),
            dataContainer: document.getElementById('dataContainer'),
            noResult: document.getElementById('noResult'),
            resultsCount: document.getElementById('resultsCount'),
            loadingState: document.getElementById('loadingState'),
            errorMessage: document.getElementById('errorMessage'),
            header: document.getElementById('header'),
            searchShortcut: document.getElementById('searchShortcut'),
        };

        // ================= DEVICE DETECTION =================
        function isDesktopDevice() {
            // Check if it's a desktop device based on screen width and pointer capability
            const minWidth = 768;
            const hasHover = window.matchMedia('(hover: hover) and (pointer: fine)').matches;
            const isLargeScreen = window.innerWidth >= minWidth;
            
            // Also check for touch capability
            const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
            
            // Desktop if: large screen + fine pointer (mouse) OR (large screen and not primarily touch)
            return (isLargeScreen && hasHover) || (isLargeScreen && !isTouchDevice);
        }

        function toggleShortcutVisibility() {
            if (elements.searchShortcut) {
                if (isDesktopDevice()) {
                    elements.searchShortcut.style.display = 'block';
                } else {
                    elements.searchShortcut.style.display = 'none';
                }
            }
        }

        // Listen for resize and orientation changes to re-evaluate
        let resizeTimeout;
        function handleResize() {
            if (resizeTimeout) clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                toggleShortcutVisibility();
            }, 150);
        }

        // ================= UTILITIES =================
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showError(message) {
            elements.errorMessage.textContent = `⚠️ ${message}`;
            elements.errorMessage.classList.add('visible');
            state.hasError = true;
        }

        function hideError() {
            elements.errorMessage.classList.remove('visible');
            state.hasError = false;
        }

        function highlightText(text, keyword) {
            if (!keyword || !keyword.trim()) return escapeHtml(text);
            const sanitizedKeyword = keyword.trim().replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            if (sanitizedKeyword.length === 0) return escapeHtml(text);
            const regex = new RegExp(`(${sanitizedKeyword})`, 'gi');
            const escaped = escapeHtml(text);
            return escaped.replace(regex, '<mark>$1</mark>');
        }

        // ================= RENDER FUNCTION =================
        function renderCards(data, keyword = '', isSearching = false) {
            const container = elements.dataContainer;
            container.innerHTML = '';

            if (!data || data.length === 0) {
                elements.noResult.classList.add('visible');
                elements.resultsCount.classList.remove('visible');
                return;
            }

            elements.noResult.classList.remove('visible');
            
            // ONLY show results count when searching (keyword exists)
            if (isSearching && keyword) {
                elements.resultsCount.classList.add('visible');
                elements.resultsCount.textContent = `Ditemukan ${data.length} hasil`;
            } else {
                elements.resultsCount.classList.remove('visible');
            }

            // Use DocumentFragment for better performance
            const fragment = document.createDocumentFragment();
            
            data.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.setAttribute('tabindex', '0');
                card.setAttribute('role', 'article');
                card.setAttribute('aria-label', `${item.provinsi}, ${item.kota} - Area ${item.area}`);
                
                card.style.animation = `fadeInUp 0.2s ease-out ${index * 0.02}s backwards`;
                
                card.innerHTML = `
                    <div class="card-content">
                        <div class="provinsi">${highlightText(item.provinsi, keyword)}</div>
                        <div class="kota">${highlightText(item.kota, keyword)}</div>
                    </div>
                    <span class="badge">${escapeHtml(item.area)}</span>
                `;
                fragment.appendChild(card);
            });
            
            container.appendChild(fragment);
            hideError();
        }

        // Add keyframe animation dynamically
        if (!document.querySelector('#dynamic-styles')) {
            const style = document.createElement('style');
            style.id = 'dynamic-styles';
            style.textContent = `
                @keyframes fadeInUp {
                    from {
                        opacity: 0;
                        transform: translateY(8px);
                    }
                    to {
                        opacity: 1;
                        transform: translateY(0);
                    }
                }
            `;
            document.head.appendChild(style);
        }

        // ================= FILTER & SEARCH LOGIC =================
        function filterAndRender() {
            const keyword = state.searchQuery.trim().toLowerCase();
            const isSearching = keyword.length > 0;
            
            if (!isSearching) {
                // Show all data, hide results count
                renderCards(state.allData, '', false);
                elements.searchClear.classList.remove('visible');
                return;
            }
            
            elements.searchClear.classList.add('visible');
            
            const filtered = state.allData.filter(item => 
                item.provinsi.toLowerCase().includes(keyword) ||
                item.kota.toLowerCase().includes(keyword)
            );
            
            // Pass isSearching=true to show results count
            renderCards(filtered, keyword, true);
        }

        function updateSearchQuery(value) {
            state.searchQuery = value;
            filterAndRender();
        }

        // ================= DEBOUNCE =================
        function debounce(func, delay) {
            let timeoutId;
            return function (...args) {
                clearTimeout(timeoutId);
                timeoutId = setTimeout(() => func.apply(this, args), delay);
            };
        }

        // ================= EVENT HANDLERS =================
        const handleSearchInput = debounce((event) => {
            updateSearchQuery(event.target.value);
        }, CONFIG.DEBOUNCE_DELAY);

        function clearSearch() {
            elements.searchInput.value = '';
            updateSearchQuery('');
            elements.searchInput.focus();
        }

        function initSearchListeners() {
            elements.searchInput.addEventListener('input', handleSearchInput);
            elements.searchClear.addEventListener('click', clearSearch);
            
            elements.searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    e.preventDefault();
                    clearSearch();
                }
            });
            
            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === '/') {
                    e.preventDefault();
                    elements.searchInput.focus();
                }
            });
        }

        // ================= DATA LOADING WITH RETRY =================
        async function loadDataWithRetry(retries = 2, delay = 500) {
            for (let i = 0; i <= retries; i++) {
                try {
                    return await loadData();
                } catch (error) {
                    if (i === retries) throw error;
                    await new Promise(resolve => setTimeout(resolve, delay));
                }
            }
        }

        async function loadData() {
            try {
                elements.loadingState.style.display = 'block';
                hideError();
                elements.dataContainer.innerHTML = '';
                
                const url = `${CONFIG.DATA_URL}?t=${Date.now()}`;
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                
                if (!Array.isArray(data)) {
                    throw new Error('Format data tidak valid (bukan array)');
                }
                
                if (data.length === 0) {
                    throw new Error('Data kosong');
                }
                
                const isValid = data.every(item => 
                    item && typeof item.provinsi === 'string' && 
                    typeof item.kota === 'string' && 
                    typeof item.area === 'string'
                );
                
                if (!isValid) {
                    throw new Error('Beberapa data memiliki format yang tidak sesuai');
                }
                
                state.allData = data;
                state.isLoading = false;
                elements.loadingState.style.display = 'none';
                
                // Initial render - NO results count shown
                renderCards(data, '', false);
                initSearchListeners();
                
            } catch (error) {
                state.isLoading = false;
                elements.loadingState.style.display = 'none';
                console.error('Error loading coverage data:', error);
                showError(`Gagal memuat data coverage. ${error.message}. Silakan refresh halaman.`);
                elements.dataContainer.innerHTML = '';
                elements.noResult.classList.add('visible');
                elements.noResult.querySelector('.no-result-text').textContent = 'Gagal memuat data';
                elements.noResult.querySelector('.no-result-hint').textContent = 'Periksa koneksi internet atau coba lagi nanti';
            }
        }

        // ================= SCROLL EFFECT =================
        let scrollTimeout;
        function handleScroll() {
            if (scrollTimeout) cancelAnimationFrame(scrollTimeout);
            scrollTimeout = requestAnimationFrame(() => {
                const isScrolled = window.scrollY > CONFIG.SCROLL_THRESHOLD;
                elements.header.classList.toggle('scrolled', isScrolled);
            });
        }

        // ================= INITIALIZATION =================
        function init() {
            window.addEventListener('scroll', handleScroll, { passive: true });
            window.addEventListener('resize', handleResize);
            window.addEventListener('orientationchange', handleResize);
            
            // Set initial shortcut visibility
            toggleShortcutVisibility();
            
            loadDataWithRetry().catch(console.warn);
        }

        // Start the app
        init();
    </script>
</body>
</html>
