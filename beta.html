<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Cek area coverage paket XL Akrab di seluruh Indonesia - Cepat, akurat, dan mudah digunakan">
    <meta name="theme-color" content="#2563eb">
    <meta name="color-scheme" content="light dark">
    <link rel="icon" type="image/png" href="webicon.png">
    <title>Cek Area XL Akrab - Coverage Terbaru 2026</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #3b82f6;
            --success: #25D366;
            --success-dark: #128C7E;
            
            /* Light mode */
            --bg: #f8fafc;
            --bg-secondary: #f1f5f9;
            --card: #ffffff;
            --text: #0f172a;
            --text-secondary: #475569;
            --subtext: #64748b;
            --border: #e2e8f0;
            --border-light: #f1f5f9;
            --error: #ef4444;
            --error-bg: #fef2f2;
            --mark-bg: #fef08a;
            --mark-text: #854d0e;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --transition-fast: 0.15s ease;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #020617;
                --bg-secondary: #0f172a;
                --card: #0f172a;
                --text: #f1f5f9;
                --text-secondary: #cbd5e1;
                --subtext: #94a3b8;
                --border: #1e293b;
                --border-light: #334155;
                --mark-bg: #854d0e;
                --mark-text: #fef08a;
                --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.3);
                --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.4);
                --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.5);
            }
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            transition: background var(--transition), color var(--transition);
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Layout */
        .page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            padding: 1rem 1rem 1.25rem;
            z-index: 20;
            color: white;
            transition: box-shadow var(--transition-fast), padding var(--transition-fast);
        }

        .header.scrolled {
            padding: 0.75rem 1rem 1rem;
            box-shadow: var(--shadow-lg);
        }

        .title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            font-size: 1.125rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            flex-wrap: wrap;
        }

        .title-left {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .title-icon {
            width: 1.5rem;
            height: 1.5rem;
            object-fit: contain;
            filter: drop-shadow(0 1px 2px rgba(0,0,0,0.2));
        }

        .stats-badge {
            background: rgba(255,255,255,0.2);
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 500;
            backdrop-filter: blur(4px);
        }

        /* Search Box */
        .search-wrapper {
            margin-top: 0.875rem;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 0.75rem 2.5rem 0.75rem 1rem;
            border-radius: 0.75rem;
            border: none;
            font-size: 0.9375rem;
            background: rgba(255, 255, 255, 0.12);
            color: white;
            backdrop-filter: blur(8px);
            transition: all var(--transition-fast);
            font-family: inherit;
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .search-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 0 2px rgba(255,255,255,0.3);
        }

        .search-clear {
            position: absolute;
            right: 0.625rem;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.25);
            border: none;
            color: white;
            width: 1.75rem;
            height: 1.75rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 1rem;
            display: none;
            align-items: center;
            justify-content: center;
            transition: background var(--transition-fast);
        }

        .search-clear:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        .search-clear:focus-visible {
            outline: 2px solid white;
            outline-offset: 2px;
        }

        .search-clear.visible {
            display: flex;
        }

        /* Search Shortcut - Desktop only */
        .search-shortcut {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-top: 0.5rem;
            text-align: right;
            display: none;
        }
        
        @media (min-width: 768px) {
            .search-shortcut {
                display: block;
            }
        }

        /* Popular Searches */
        .popular-searches {
            margin-top: 0.5rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-items: center;
        }

        .popular-label {
            font-size: 0.7rem;
            opacity: 0.8;
        }

        .popular-chip {
            background: rgba(255,255,255,0.15);
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: background var(--transition-fast);
            border: none;
            color: white;
            font-family: inherit;
        }

        .popular-chip:hover {
            background: rgba(255,255,255,0.25);
        }

        /* Container */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 1.25rem 1rem;
            flex: 1;
            width: 100%;
        }

        /* Info Bar */
        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border-light);
        }

        .last-updated {
            font-size: 0.7rem;
            color: var(--subtext);
        }

        .sort-container {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .sort-label {
            font-size: 0.7rem;
            color: var(--subtext);
        }

        .sort-select {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 0.25rem 0.5rem;
            border-radius: 0.5rem;
            font-size: 0.7rem;
            color: var(--text);
            cursor: pointer;
            font-family: inherit;
        }

        /* Loading State */
        .loading-state {
            text-align: center;
            padding: 3rem 1rem;
        }

        .spinner {
            display: inline-block;
            width: 2rem;
            height: 2rem;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 0.75rem;
            color: var(--subtext);
            font-size: 0.875rem;
        }

        /* Loading Skeleton */
        .skeleton-grid {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .skeleton-card {
            background: var(--card);
            border-radius: 1rem;
            padding: 1rem;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .skeleton-content {
            flex: 1;
        }

        .skeleton-line {
            height: 1rem;
            background: linear-gradient(90deg, var(--border) 25%, var(--border-light) 50%, var(--border) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 0.25rem;
            margin-bottom: 0.5rem;
        }

        .skeleton-line.short {
            width: 60%;
            height: 0.75rem;
        }

        .skeleton-badge {
            width: 4rem;
            height: 1.75rem;
            background: linear-gradient(90deg, var(--border) 25%, var(--border-light) 50%, var(--border) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 999px;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Error Message */
        .error-message {
            background: var(--error-bg);
            color: var(--error);
            padding: 0.875rem 1rem;
            border-radius: 0.75rem;
            margin-bottom: 1rem;
            border-left: 4px solid var(--error);
            display: none;
            font-size: 0.875rem;
        }

        .error-message.visible {
            display: block;
        }

        /* Results Count */
        .results-count {
            padding: 0.5rem 0;
            margin-bottom: 1rem;
            color: var(--subtext);
            font-size: 0.8125rem;
            display: none;
            border-bottom: 1px solid var(--border-light);
        }

        .results-count.visible {
            display: block;
        }

        /* Cards */
        .cards-grid {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .card {
            background: var(--card);
            border-radius: 1rem;
            padding: 1rem;
            border: 1px solid var(--border);
            transition: all var(--transition);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--primary-light);
        }

        .card:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        .card-content {
            flex: 1;
            min-width: 0;
        }

        .provinsi {
            font-weight: 800;
            font-size: 1rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .provinsi::before {
            content: "";
            display: inline-block;
            width: 4px;
            height: 1.125rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 4px;
            flex-shrink: 0;
        }

        .kota {
            font-size: 0.8125rem;
            color: var(--text-secondary);
            line-height: 1.4;
            word-break: break-word;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.375rem 0.875rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.01em;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: var(--shadow-sm);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .copy-btn {
            background: transparent;
            border: 1px solid var(--border);
            padding: 0.25rem 0.5rem;
            border-radius: 0.5rem;
            font-size: 0.7rem;
            cursor: pointer;
            color: var(--subtext);
            transition: all var(--transition-fast);
        }

        .copy-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        mark {
            background: var(--mark-bg);
            color: var(--mark-text);
            border-radius: 0.25rem;
            padding: 0.125rem 0.25rem;
            font-weight: 600;
        }

        /* No Result */
        .no-result {
            text-align: center;
            padding: 3rem 1rem;
            display: none;
        }

        .no-result.visible {
            display: block;
        }

        .no-result-icon {
            font-size: 3rem;
            margin-bottom: 0.75rem;
            opacity: 0.7;
        }

        .no-result-text {
            color: var(--error);
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .no-result-hint {
            color: var(--subtext);
            font-size: 0.8125rem;
            margin-bottom: 1rem;
        }

        .suggestion-chips {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .suggestion-chip {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 0.375rem 0.875rem;
            border-radius: 999px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all var(--transition-fast);
            color: var(--text);
        }

        .suggestion-chip:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Recent Searches */
        .recent-searches {
            margin-bottom: 1rem;
            padding: 0.5rem 0;
            display: none;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.5rem;
        }

        .recent-searches.visible {
            display: flex;
        }

        .recent-label {
            font-size: 0.7rem;
            color: var(--subtext);
        }

        .recent-chip {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.7rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all var(--transition-fast);
        }

        .recent-chip:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .recent-remove {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.8rem;
            padding: 0 0.25rem;
            color: inherit;
        }

        .clear-history {
            background: none;
            border: none;
            color: var(--error);
            font-size: 0.7rem;
            cursor: pointer;
            text-decoration: underline;
        }

        /* Scroll to Top Button */
        .scroll-top {
            position: fixed;
            bottom: 5rem;
            right: 1.25rem;
            background: var(--primary);
            color: white;
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--shadow-lg);
            transition: all var(--transition-fast);
            z-index: 30;
            border: none;
            font-size: 1.25rem;
        }

        .scroll-top.visible {
            display: flex;
        }

        .scroll-top:hover {
            transform: translateY(-2px);
            background: var(--primary-dark);
        }

        /* Footer */
        .footer {
            margin-top: auto;
            padding: 1.5rem;
            text-align: center;
            font-size: 0.75rem;
            color: var(--subtext);
            border-top: 1px solid var(--border);
        }

        /* WhatsApp Button */
        .wa-container {
            position: fixed;
            bottom: 1.25rem;
            right: 1.25rem;
            z-index: 30;
        }

        .wa-float {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.625rem 1rem;
            background: var(--success);
            border-radius: 999px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.8125rem;
            box-shadow: var(--shadow-lg);
            transition: all var(--transition);
            border: none;
            cursor: pointer;
        }

        .wa-float:hover {
            transform: translateY(-2px) scale(1.02);
            background: var(--success-dark);
        }

        .wa-icon {
            width: 1.375rem;
            height: 1.375rem;
            fill: white;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .title {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
            }
            .container {
                padding: 1rem;
            }
            .card {
                padding: 0.875rem;
            }
            .provinsi {
                font-size: 0.9375rem;
            }
            .badge {
                font-size: 0.6875rem;
                padding: 0.25rem 0.75rem;
            }
            .scroll-top {
                bottom: 5.5rem;
            }
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--subtext);
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <div class="page">
        <div class="header" id="header">
            <div class="title">
                <div class="title-left">
                    <img src="satellite.png" alt="Satellite Icon" class="title-icon" loading="lazy">

    <script>
        // ================= CONFIGURATION =================
        const CONFIG = {
            DATA_URL: 'data.json',
            DEBOUNCE_DELAY: 250,
            SCROLL_THRESHOLD: 10,
            STORAGE_KEY: 'xl_akrab_searches',
            MAX_RECENT: 5
        };

        // ================= STATE MANAGEMENT =================
        let state = {
            allData: [],
            filteredData: [],
            isLoading: true,
            hasError: false,
            searchQuery: '',
            currentSort: 'default',
            lastUpdated: null
        };

        // DOM Elements
        const elements = {
            searchInput: document.getElementById('searchInput'),
            searchClear: document.getElementById('searchClear'),
            dataContainer: document.getElementById('dataContainer'),
            noResult: document.getElementById('noResult'),
            resultsCount: document.getElementById('resultsCount'),
            loadingState: document.getElementById('loadingState'),
            skeletonGrid: document.getElementById('skeletonGrid'),
            errorMessage: document.getElementById('errorMessage'),
            header: document.getElementById('header'),
            searchShortcut: document.getElementById('searchShortcut'),
            statsBadge: document.getElementById('statsBadge'),
            lastUpdated: document.getElementById('lastUpdated'),
            sortSelect: document.getElementById('sortSelect'),
            scrollTopBtn: document.getElementById('scrollTopBtn'),
            recentSearches: document.getElementById('recentSearches'),
            recentChips: document.getElementById('recentChips'),
            clearHistory: document.getElementById('clearHistory'),
            suggestionChips: document.getElementById('suggestionChips'),
            popularChips: document.querySelectorAll('.popular-chip')
        };

        // ================= RECENT SEARCHES =================
        function getRecentSearches() {
            const stored = localStorage.getItem(CONFIG.STORAGE_KEY);
            return stored ? JSON.parse(stored) : [];
        }

        function saveRecentSearch(query) {
            if (!query.trim()) return;
            let searches = getRecentSearches();
            searches = searches.filter(s => s.toLowerCase() !== query.toLowerCase());
            searches.unshift(query.trim());
            if (searches.length > CONFIG.MAX_RECENT) searches.pop();
            localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(searches));
            renderRecentSearches();
        }

        function removeRecentSearch(query) {
            let searches = getRecentSearches();
            searches = searches.filter(s => s !== query);
            localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(searches));
            renderRecentSearches();
        }

        function clearAllRecentSearches() {
            localStorage.removeItem(CONFIG.STORAGE_KEY);
            renderRecentSearches();
        }

        function renderRecentSearches() {
            const searches = getRecentSearches();
            if (searches.length === 0) {
                elements.recentSearches.classList.remove('visible');
                return;
            }
            elements.recentSearches.classList.add('visible');
            elements.recentChips.innerHTML = searches.map(s => `
                <div class="recent-chip" data-search="${escapeHtml(s)}">
                    🔍 ${escapeHtml(s)}
                    <button class="recent-remove" data-search="${escapeHtml(s)}" aria-label="Hapus">✕</button>
                </div>
            `).join('');
            
            document.querySelectorAll('.recent-chip').forEach(chip => {
                chip.addEventListener('click', (e) => {
                    if (e.target.classList.contains('recent-remove')) {
                        e.stopPropagation();
                        removeRecentSearch(chip.dataset.search);
                    } else {
                        elements.searchInput.value = chip.dataset.search;
                        updateSearchQuery(chip.dataset.search);
                    }
                });
            });
        }

        // ================= SORTING =================
        function sortData(data, sortType) {
            if (!data) return [];
            const sorted = [...data];
            switch(sortType) {
                case 'provinsi-asc':
                    sorted.sort((a, b) => a.provinsi.localeCompare(b.provinsi, 'id'));
                    break;
                case 'provinsi-desc':
                    sorted.sort((a, b) => b.provinsi.localeCompare(a.provinsi, 'id'));
                    break;
                case 'kota-asc':
                    sorted.sort((a, b) => a.kota.localeCompare(b.kota, 'id'));
                    break;
                default:
                    return sorted;
            }
            return sorted;
        }

        // ================= UTILITIES =================
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showError(message) {
            elements.errorMessage.textContent = `⚠️ ${message}`;
            elements.errorMessage.classList.add('visible');
            state.hasError = true;
        }

        function hideError() {
            elements.errorMessage.classList.remove('visible');
            state.hasError = false;
        }

        function highlightText(text, keyword) {
            if (!keyword || !keyword.trim()) return escapeHtml(text);
            const sanitizedKeyword = keyword.trim().replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            if (sanitizedKeyword.length === 0) return escapeHtml(text);
            const regex = new RegExp(`(${sanitizedKeyword})`, 'gi');
            const escaped = escapeHtml(text);
            return escaped.replace(regex, '<mark>$1</mark>');
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            // Visual feedback without micro-interaction library
        }

        function updateURLState(query) {
            const url = new URL(window.location);
            if (query) {
                url.searchParams.set('q', query);
            } else {
                url.searchParams.delete('q');
            }
            window.history.pushState({}, '', url);
        }

        // ================= RENDER FUNCTION =================
        function renderCards(data, keyword = '', isSearching = false) {
            const container = elements.dataContainer;
            container.innerHTML = '';

            if (!data || data.length === 0) {
                elements.noResult.classList.add('visible');
                elements.resultsCount.classList.remove('visible');
                renderSuggestions(keyword);
                return;
            }

            elements.noResult.classList.remove('visible');
            
            if (isSearching && keyword) {
                elements.resultsCount.classList.add('visible');
                elements.resultsCount.textContent = `Ditemukan ${data.length} hasil`;
            } else {
                elements.resultsCount.classList.remove('visible');
            }

            const fragment = document.createDocumentFragment();
            
            data.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.setAttribute('tabindex', '0');
                card.setAttribute('role', 'article');
                card.setAttribute('aria-label', `${item.provinsi}, ${item.kota} - Area ${item.area}`);
                
                card.style.animation = `fadeInUp 0.2s ease-out ${index * 0.02}s backwards`;
                
                card.innerHTML = `
                    <div class="card-content">
                        <div class="provinsi">
                            ${highlightText(item.provinsi, keyword)}
                            <button class="copy-btn" data-copy="${escapeHtml(item.provinsi)}, ${escapeHtml(item.kota)}" aria-label="Salin lokasi">Salin</button>
                        </div>
                        <div class="kota">${highlightText(item.kota, keyword)}</div>
                    </div>
                    <span class="badge">${escapeHtml(item.area)}</span>
                `;
                fragment.appendChild(card);
            });
            
            container.appendChild(fragment);
            
            // Add copy buttons listeners
            document.querySelectorAll('.copy-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    copyToClipboard(btn.dataset.copy);
                    btn.textContent = '✓ Tersalin';
                    setTimeout(() => { btn.textContent = 'Salin'; }, 1500);
                });
            });
            
            hideError();
        }

        function renderSuggestions(keyword) {
            if (!keyword) {
                elements.suggestionChips.innerHTML = '';
                return;
            }
            const suggestions = ['Jakarta', 'Surabaya', 'Bandung', 'Medan', 'Bali', 'Yogyakarta', 'Semarang']
                .filter(s => s.toLowerCase().includes(keyword.toLowerCase()) || !keyword)
                .slice(0, 5);
            
            if (suggestions.length === 0) {
                elements.suggestionChips.innerHTML = '';
                return;
            }
            
            elements.suggestionChips.innerHTML = suggestions.map(s => 
                `<button class="suggestion-chip" data-suggestion="${escapeHtml(s)}">${escapeHtml(s)}</button>`
            ).join('');
            
            document.querySelectorAll('.suggestion-chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    elements.searchInput.value = chip.dataset.suggestion;
                    updateSearchQuery(chip.dataset.suggestion);
                });
            });
        }

        // Add animation keyframes
        if (!document.querySelector('#dynamic-styles')) {
            const style = document.createElement('style');
            style.id = 'dynamic-styles';
            style.textContent = `
                @keyframes fadeInUp {
                    from { opacity: 0; transform: translateY(8px); }
                    to { opacity: 1; transform: translateY(0); }
                }
            `;
            document.head.appendChild(style);
        }

        // ================= FILTER, SORT & SEARCH =================
        function filterAndRender() {
            const keyword = state.searchQuery.trim().toLowerCase();
            const isSearching = keyword.length > 0;
            
            let filtered = state.allData;
            
            if (isSearching) {
                filtered = state.allData.filter(item => 
                    item.provinsi.toLowerCase().includes(keyword) ||
                    item.kota.toLowerCase().includes(keyword)
                );
            }
            
            const sorted = sortData(filtered, state.currentSort);
            state.filteredData = sorted;
            
            if (!isSearching) {
                renderCards(sorted, '', false);
                elements.searchClear.classList.remove('visible');
            } else {
                elements.searchClear.classList.add('visible');
                renderCards(sorted, keyword, true);
            }
        }

        function updateSearchQuery(value) {
            state.searchQuery = value;
            filterAndRender();
            updateURLState(value);
            if (value.trim()) {
                saveRecentSearch(value);
            }
        }

        // ================= DEBOUNCE =================
        function debounce(func, delay) {
            let timeoutId;
            return function (...args) {
                clearTimeout(timeoutId);
                timeoutId = setTimeout(() => func.apply(this, args), delay);
            };
        }

        // ================= EVENT HANDLERS =================
        const handleSearchInput = debounce((event) => {
            updateSearchQuery(event.target.value);
        }, CONFIG.DEBOUNCE_DELAY);

        function clearSearch() {
            elements.searchInput.value = '';
            updateSearchQuery('');
            elements.searchInput.focus();
        }

        function initSearchListeners() {
            elements.searchInput.addEventListener('input', handleSearchInput);
            elements.searchClear.addEventListener('click', clearSearch);
            
            elements.searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    e.preventDefault();
                    clearSearch();
                }
            });
            
            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === '/') {
                    e.preventDefault();
                    elements.searchInput.focus();
                }
            });
            
            elements.sortSelect.addEventListener('change', (e) => {
                state.currentSort = e.target.value;
                filterAndRender();
            });
            
            elements.popularChips.forEach(chip => {
                chip.addEventListener('click', () => {
                    elements.searchInput.value = chip.dataset.search;
                    updateSearchQuery(chip.dataset.search);
                });
            });
            
            elements.clearHistory.addEventListener('click', () => {
                clearAllRecentSearches();
            });
        }

        // ================= DATA LOADING =================
        function showSkeleton() {
            elements.skeletonGrid.style.display = 'block';
            elements.loadingState.style.display = 'none';
            elements.dataContainer.style.display = 'none';
        }

        function hideSkeleton() {
            elements.skeletonGrid.style.display = 'none';
            elements.dataContainer.style.display = 'flex';
        }

        async function loadData() {
            try {
                showSkeleton();
                hideError();
                
                const url = `${CONFIG.DATA_URL}?t=${Date.now()}`;
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                
                if (!Array.isArray(data)) {
                    throw new Error('Format data tidak valid (bukan array)');
                }
                
                if (data.length === 0) {
                    throw new Error('Data kosong');
                }
                
                const isValid = data.every(item => 
                    item && typeof item.provinsi === 'string' && 
                    typeof item.kota === 'string' && 
                    typeof item.area === 'string'
                );
                
                if (!isValid) {
                    throw new Error('Beberapa data memiliki format yang tidak sesuai');
                }
                
                state.allData = data;
                state.isLoading = false;
                state.lastUpdated = new Date();
                
                // Update UI
                const uniqueProvinces = new Set(data.map(d => d.provinsi)).size;
                elements.statsBadge.textContent = `${data.length} kota • ${uniqueProvinces} provinsi`;
                elements.lastUpdated.textContent = `Last update: ${state.lastUpdated.toLocaleDateString('id-ID')} ${state.lastUpdated.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'})}`;
                
                hideSkeleton();
                
                // Check URL for search query
                const urlParams = new URLSearchParams(window.location.search);
                const urlQuery = urlParams.get('q');
                if (urlQuery) {
                    elements.searchInput.value = urlQuery;
                    updateSearchQuery(urlQuery);
                } else {
                    renderCards(data, '', false);
                }
                
                initSearchListeners();
                renderRecentSearches();
                
            } catch (error) {
                state.isLoading = false;
                hideSkeleton();
                console.error('Error loading coverage data:', error);
                showError(`Gagal memuat data coverage. ${error.message}. Silakan refresh halaman.`);
                elements.dataContainer.innerHTML = '';
                elements.noResult.classList.add('visible');
                elements.noResult.querySelector('.no-result-text').textContent = 'Gagal memuat data';
                elements.noResult.querySelector('.no-result-hint').textContent = 'Periksa koneksi internet atau coba lagi nanti';
            }
        }

        // ================= SCROLL EFFECTS =================
        let scrollTimeout;
        function handleScroll() {
            if (scrollTimeout) cancelAnimationFrame(scrollTimeout);
            scrollTimeout = requestAnimationFrame(() => {
                const isScrolled = window.scrollY > CONFIG.SCROLL_THRESHOLD;
                elements.header.classList.toggle('scrolled', isScrolled);
                elements.scrollTopBtn.classList.toggle('visible', window.scrollY > 300);
            });
        }

        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ================= DEVICE DETECTION =================
        function isDesktopDevice() {
            const minWidth = 768;
            const hasHover = window.matchMedia('(hover: hover) and (pointer: fine)').matches;
            const isLargeScreen = window.innerWidth >= minWidth;
            const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
            return (isLargeScreen && hasHover) || (isLargeScreen && !isTouchDevice);
        }

        function toggleShortcutVisibility() {
            if (elements.searchShortcut) {
                elements.searchShortcut.style.display = isDesktopDevice() ? 'block' : 'none';
            }
        }

        let resizeTimeout;
        function handleResize() {
            if (resizeTimeout) clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                toggleShortcutVisibility();
            }, 150);
        }

        // ================= PULL TO REFRESH =================
        let touchStartY = 0;
        let isRefreshing = false;
        
        function handleTouchStart(e) {
            if (window.scrollY === 0) {
                touchStartY = e.touches[0].clientY;
            }
        }
        
        function handleTouchMove(e) {
            if (touchStartY === 0) return;
            const touchY = e.touches[0].clientY;
            const diff = touchY - touchStartY;
            if (diff > 60 && !isRefreshing && window.scrollY === 0) {
                isRefreshing = true;
                location.reload();
            }
        }
        
        function initPullToRefresh() {
            document.addEventListener('touchstart', handleTouchStart, { passive: true });
            document.addEventListener('touchmove', handleTouchMove, { passive: true });
        }

        // ================= INITIALIZATION =================
        function init() {
            window.addEventListener('scroll', handleScroll, { passive: true });
            window.addEventListener('resize', handleResize);
            window.addEventListener('orientationchange', handleResize);
            elements.scrollTopBtn.addEventListener('click', scrollToTop);
            
            toggleShortcutVisibility();
            initPullToRefresh();
            
            loadData();
        }

        // Handle browser back/forward
        window.addEventListener('popstate', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const urlQuery = urlParams.get('q') || '';
            elements.searchInput.value = urlQuery;
            updateSearchQuery(urlQuery);
        });

        // Start the app
        init();
    </script>
</body>
</html>
