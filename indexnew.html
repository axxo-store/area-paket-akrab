<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cek Area XL Akrab</title>

<style>
:root {
    --primary: #2563eb;
    --bg: #0f172a;
    --card: rgba(255,255,255,0.05);
    --text: #e2e8f0;
    --border: rgba(255,255,255,0.08);
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: system-ui, sans-serif;
    background: linear-gradient(135deg, #020617, #0f172a);
    color: var(--text);
}

/* HEADER */
.header {
    position: sticky;
    top: 0;
    background: var(--card);
    padding: 18px 15px;
    border-bottom: 1px solid var(--border);
    z-index: 10;
    transition: all 0.3s ease;
    backdrop-filter: blur(0px);
}

/* when scrolling */
.header.scrolled {
    padding: 10px 15px;
    box-shadow: 0 6px 16px rgba(0,0,0,0.12);
    backdrop-filter: blur(10px);
}

.title {
    font-size: 20px;
    font-weight: 800;
    transition: all 0.3s ease;
}

/* shrink title */
.header.scrolled .title {
    font-size: 16px;
}

.glass-header {
    position: sticky;
    top: 10px;
    margin: 10px;
    border-radius: 18px;
    backdrop-filter: blur(12px);
    background: rgba(15,23,42,0.6);
    padding: 15px;
    border: 1px solid rgba(255,255,255,0.1);
    z-index: 10;
}

.glass-header .title {
    font-size: 18px;
    font-weight: 800;
    margin-bottom: 10px;
}

.header.scrolled {
    backdrop-filter: blur(12px);
    background: rgba(255,255,255,0.7);
}

@media (prefers-color-scheme: dark) {
    .header.scrolled {
        background: rgba(15,23,42,0.7);
    }
}

/* SEARCH */
.search-box input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1px solid var(--border);
    font-size: 14px;
    background: rgba(255,255,255,0.05);
    color: var(--text);
    transition: 0.2s;
}

.search-box input:focus {
    outline: none;
    border-color: var(--primary);
    background: rgba(255,255,255,0.08);
}

/* CONTAINER */
.container {
    max-width: 900px;
    margin: auto;
    padding: 15px;
}

/* CARD */
.card {
    background: var(--card);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 14px;
    border: 1px solid var(--border);
    backdrop-filter: blur(6px);
    transition: 0.25s;
}

.card:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

/* TEXT */
.provinsi {
    font-weight: 700;
    font-size: 15px;
    margin-bottom: 6px;
}

.kota {
    font-size: 13.5px;
    opacity: 0.8;
    margin-bottom: 10px;
    line-height: 1.5;
}

/* BADGE */
.badge {
    display: inline-block;
    padding: 5px 12px;
    border-radius: 999px;
    background: var(--primary);
    color: white;
    font-size: 11px;
    font-weight: 600;
}

/* HIGHLIGHT */
mark {
    background: #facc15;
    color: black;
    border-radius: 4px;
    padding: 0 2px;
}

/* NO RESULT */
#noResult {
    text-align: center;
    margin-top: 20px;
    color: #f87171;
    display: none;
}

/* WA BUTTON */
.wa-container {
    position: fixed;
    bottom: 20px;
    right: 20px;
}

.wa-float {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: #25D366;
    border-radius: 999px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.4);
    color: white;
    font-weight: 600;
    text-decoration: none;
    animation: float 2s ease-in-out infinite;
}

.wa-float:hover {
    transform: scale(1.05);
}

/* ICON */
.wa-icon {
    width: 22px;
    fill: white;
}

/* ANIMATION */
@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
}

/* FOOTER */
.footer {
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    opacity: 0.5;
}
</style>
</head>

<body>

<div class="header glass-header">
    <div class="title">Cek Area Paket XL Akrab</div>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Cari provinsi / kota..." onkeyup="filterCards()">
    </div>
</div>

<div class="container" id="dataContainer"></div>

<p id="noResult">Data tidak ditemukan</p>

<div class="footer">©2026 AXXO STORE</div>

<div class="wa-container">
<a href="https://wa.me/6283865626030?text=Halo%20Admin,%20saya%20ingin%20order%20Paket%20XL%20Akrab" target="_blank" class="wa-float">
    <svg class="wa-icon" viewBox="0 0 32 32">
        <path d="M19.11 17.53c-.27-.14-1.6-.79-1.85-.88-.25-.09-.43-.14-.61.14-.18.27-.7.88-.86 1.06-.16.18-.32.2-.59.07-.27-.14-1.14-.42-2.18-1.34-.81-.72-1.36-1.61-1.52-1.88-.16-.27-.02-.42.12-.56.13-.13.27-.32.41-.48.14-.16.18-.27.27-.45.09-.18.05-.34-.02-.48-.07-.14-.61-1.47-.84-2.01-.22-.53-.45-.46-.61-.47-.16-.01-.34-.01-.52-.01-.18 0-.48.07-.73.34-.25.27-.95.93-.95 2.26 0 1.32.97 2.6 1.11 2.78.14.18 1.92 2.93 4.66 4.11.65.28 1.15.45 1.54.58.65.21 1.24.18 1.71.11.52-.08 1.6-.65 1.83-1.28.23-.63.23-1.17.16-1.28-.07-.11-.25-.18-.52-.32z"/>
    </svg>
    <span>Order</span>
</a>
</div>

<script>
/* ALL YOUR JS HERE */

/* fetch data */
let allData = [];

fetch('data.json')
    .then(res => res.json())
    .then(data => {
        allData = data;
        renderCards(data);
    });

function highlight(text, keyword) {
    if (!keyword) return text;

    const regex = new RegExp(`(${keyword})`, 'gi');
    return text.replace(regex, '<mark>$1</mark>');
}

function renderCards(data, keyword = '') {
    const container = document.getElementById('dataContainer');

    container.innerHTML = data.map(item => `
        <div class="card">
            <div class="provinsi">${highlight(item.provinsi, keyword)}</div>
            <div class="kota">${highlight(item.kota, keyword)}</div>
            <span class="badge">${item.area}</span>
        </div>
    `).join('');
}

/* search */
function filterCards() {
    clearTimeout(searchTimeout);

    searchTimeout = setTimeout(() => {
        const input = document.getElementById('searchInput').value.toLowerCase();

        const filtered = allData.filter(item =>
            item.provinsi.toLowerCase().includes(input) ||
            item.kota.toLowerCase().includes(input)
        );

        renderCards(filtered, input); // 🔥 pass keyword here

        document.getElementById('noResult').style.display =
            (filtered.length === 0 && input) ? 'block' : 'none';

    }, 200);
}
/* header scroll animation */
window.addEventListener('scroll', function () {
    const header = document.querySelector('.header');
    if (window.scrollY > 20) {
        header.classList.add('scrolled');
    } else {
        header.classList.remove('scrolled');
    }
});
</script>
</body>
</html>
