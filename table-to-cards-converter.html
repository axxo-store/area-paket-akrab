<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table to Cards Converter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .section {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .section h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        textarea {
            width: 100%;
            height: 300px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            resize: vertical;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-convert {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-convert:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-copy {
            background: #4CAF50;
            color: white;
        }

        .btn-copy:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        .btn-clear {
            background: #f44336;
            color: white;
        }

        .btn-clear:hover {
            background: #da190b;
            transform: translateY(-2px);
        }

        .preview {
            max-height: 400px;
            overflow-y: auto;
            border: 2px dashed #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            background: #f9f9f9;
        }

        .card {
            background: white;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        .provinsi {
            font-weight: 700;
            color: #333;
            min-width: 120px;
            font-size: 0.95em;
        }

        .kota {
            flex: 1;
            color: #666;
            font-size: 0.9em;
            line-height: 1.4;
        }

        .badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            white-space: nowrap;
        }

        .message {
            padding: 12px 15px;
            border-radius: 6px;
            margin-top: 15px;
            display: none;
            font-weight: 500;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .card {
                flex-direction: column;
                align-items: flex-start;
            }

            .badge {
                align-self: flex-start;
            }
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px 20px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Table to Cards Converter</h1>
            <p>Transform HTML table rows into beautiful card layouts</p>
        </div>

        <div class="content">
            <!-- Input Section -->
            <div class="section">
                <h2>Input: Paste HTML Table</h2>
                <textarea id="inputHtml" placeholder="Paste your &lt;tr&gt;&lt;td&gt;...&lt;/td&gt;&lt;/tr&gt; HTML here..."></textarea>
                <div class="button-group">
                    <button class="btn-convert" onclick="convertTable()">Convert to Cards</button>
                    <button class="btn-clear" onclick="clearInput()">Clear</button>
                </div>
                <div id="inputMessage" class="message"></div>
            </div>

            <!-- Output Section -->
            <div class="section">
                <h2>Output: Card HTML</h2>
                <textarea id="outputHtml" placeholder="Converted HTML will appear here..." readonly></textarea>
                <div class="button-group">
                    <button class="btn-copy" onclick="copyOutput()">📋 Copy to Clipboard</button>
                    <button class="btn-clear" onclick="clearOutput()">Clear</button>
                </div>
                <div id="outputMessage" class="message"></div>
            </div>
        </div>

        <!-- Preview Section -->
        <div class="section">
            <h2>Preview: How It Looks</h2>
            <div id="preview" class="preview">
                <div class="empty-state">Preview will appear here after conversion...</div>
            </div>
        </div>
    </div>

    <script>
        function convertTable() {
            const input = document.getElementById('inputHtml').value.trim();
            const inputMsg = document.getElementById('inputMessage');

            if (!input) {
                showMessage(inputMsg, 'Please paste HTML table rows', 'error');
                return;
            }

            try {
                // Parse table rows
                const trRegex = /<tr[^>]*>([\s\S]*?)<\/tr>/gi;
                const tdRegex = /<td[^>]*>([\s\S]*?)<\/td>/gi;

                let matches;
                let cards = [];

                while ((matches = trRegex.exec(input)) !== null) {
                    const row = matches[1];
                    const tdMatches = [...row.matchAll(tdRegex)];

                    if (tdMatches.length >= 3) {
                        const provinsi = tdMatches[0][1].trim();
                        const kota = tdMatches[1][1].trim();
                        const area = tdMatches[2][1].trim();

                        cards.push({
                            provinsi,
                            kota,
                            area
                        });
                    }
                }

                if (cards.length === 0) {
                    showMessage(inputMsg, 'No valid table rows found. Make sure format is correct.', 'error');
                    return;
                }

                // Generate output HTML
                let outputHtml = '';
                cards.forEach(card => {
                    outputHtml += `<div class="card">\n`;
                    outputHtml += `  <div class="provinsi">${escapeHtml(card.provinsi)}</div>\n`;
                    outputHtml += `  <div class="kota">${escapeHtml(card.kota)}</div>\n`;
                    outputHtml += `  <span class="badge">${escapeHtml(card.area)}</span>\n`;
                    outputHtml += `</div>\n\n`;
                });

                document.getElementById('outputHtml').value = outputHtml;

                // Generate preview
                let previewHtml = '';
                cards.forEach(card => {
                    previewHtml += `<div class="card">
                        <div class="provinsi">${escapeHtml(card.provinsi)}</div>
                        <div class="kota">${escapeHtml(card.kota)}</div>
                        <span class="badge">${escapeHtml(card.area)}</span>
                    </div>`;
                });

                document.getElementById('preview').innerHTML = previewHtml;

                showMessage(inputMsg, `✅ Successfully converted ${cards.length} rows!`, 'success');
            } catch (error) {
                showMessage(inputMsg, `Error: ${error.message}`, 'error');
            }
        }

        function copyOutput() {
            const output = document.getElementById('outputHtml');
            const outputMsg = document.getElementById('outputMessage');

            if (!output.value) {
                showMessage(outputMsg, 'Nothing to copy. Convert first!', 'error');
                return;
            }

            output.select();
            document.execCommand('copy');
            showMessage(outputMsg, '✅ Copied to clipboard!', 'success');
        }

        function clearInput() {
            document.getElementById('inputHtml').value = '';
            document.getElementById('inputMessage').textContent = '';
            document.getElementById('inputMessage').className = 'message';
        }

        function clearOutput() {
            document.getElementById('outputHtml').value = '';
            document.getElementById('outputMessage').textContent = '';
            document.getElementById('outputMessage').className = 'message';
            document.getElementById('preview').innerHTML = '<div class="empty-state">Preview will appear here after conversion...</div>';
        }

        function showMessage(element, text, type) {
            element.textContent = text;
            element.className = `message ${type}`;
            setTimeout(() => {
                element.className = 'message';
            }, 4000);
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Allow Enter key to convert (Ctrl+Enter)
        document.getElementById('inputHtml').addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                convertTable();
            }
        });
    </script>
</body>
</html>
