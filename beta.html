<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Cek area coverage paket XL Akrab di seluruh Indonesia - Desain baru, lebih segar">
    <meta name="theme-color" content="#2563eb">
    <meta name="color-scheme" content="light dark">
    <link rel="icon" type="image/png" href="webicon.png">
    <title>Cek Area XL Akrab — Desain Baru</title>

    <style>
        /* ---------- RESET & VARIABLES ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #3b82f6;
            --success: #25D366;
            --success-dark: #128C7E;

            --bg: #f8fafc;
            --bg-glass: rgba(255, 255, 255, 0.7);
            --card-bg: rgba(255, 255, 255, 0.9);
            --text: #0f172a;
            --text-secondary: #334155;
            --subtext: #64748b;
            --border: #e2e8f0;
            --border-light: #f1f5f9;
            --error: #ef4444;
            --mark-bg: #fef08a;
            --mark-text: #854d0e;

            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1);

            --transition: 0.2s ease;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #020617;
                --bg-glass: rgba(15, 23, 42, 0.8);
                --card-bg: rgba(30, 41, 59, 0.9);
                --text: #f1f5f9;
                --text-secondary: #cbd5e1;
                --subtext: #94a3b8;
                --border: #1e293b;
                --mark-bg: #854d0e;
                --mark-text: #fef08a;
            }
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            transition: background var(--transition);
        }

        /* Smooth background transition */
        .page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at 10% 20%, rgba(37, 99, 235, 0.03) 0%, transparent 70%);
        }

        /* ---------- HEADER (Glassmorphism) ---------- */
        .header {
            position: sticky;
            top: 0;
            backdrop-filter: blur(12px);
            background: var(--bg-glass);
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.5rem;
            z-index: 20;
            transition: box-shadow var(--transition);
        }

        .header.scrolled {
            box-shadow: var(--shadow-sm);
        }

        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
        }

        .title {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            text-align: center;
        }

        /* Search area – centered */
        .search-area {
            max-width: 600px;
            margin: 1rem auto 0.5rem;
        }

        .search-wrapper {
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 0.9rem 2.8rem 0.9rem 1.2rem;
            border-radius: 2rem;
            border: 1px solid var(--border);
            background: var(--card-bg);
            font-size: 1rem;
            backdrop-filter: blur(4px);
            transition: all var(--transition);
            color: var(--text);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
        }

        .search-clear {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--subtext);
            display: none;
            padding: 0.25rem;
        }

        .search-clear.visible {
            display: block;
        }

        /* Shortcut hint & popular chips */
        .search-shortcut {
            text-align: center;
            font-size: 0.7rem;
            color: var(--subtext);
            margin-top: 0.5rem;
            display: none;
        }
        @media (min-width: 768px) {
            .search-shortcut { display: block; }
        }

        .popular-searches {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }

        .popular-label {
            font-size: 0.7rem;
            color: var(--subtext);
        }

        .popular-chip {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 0.25rem 0.9rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all var(--transition);
            color: var(--text);
        }

        .popular-chip:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* ---------- MAIN CONTAINER (Masonry Grid) ---------- */
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            flex: 1;
            width: 100%;
        }

        /* Results count */
        .results-count {
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            color: var(--subtext);
            display: none;
        }
        .results-count.visible { display: block; }

        /* Grid layout – responsive masonry */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        /* Card redesign */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(4px);
            border-radius: 1.5rem;
            border: 1px solid var(--border);
            padding: 1.2rem;
            transition: all var(--transition);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary-light);
        }

        .provinsi {
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: -0.3px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .badge {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            padding: 0.2rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: 600;
            color: white;
            white-space: nowrap;
        }

        .kota {
            font-size: 0.9rem;
            color: var(--text-secondary);
            border-left: 3px solid var(--primary);
            padding-left: 0.7rem;
            margin-top: 0.25rem;
        }

        mark {
            background: var(--mark-bg);
            color: var(--mark-text);
            border-radius: 0.25rem;
            padding: 0 0.2rem;
        }

        /* Skeleton (matching card shape) */
        .skeleton-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .skeleton-card {
            background: var(--card-bg);
            border-radius: 1.5rem;
            padding: 1.2rem;
            border: 1px solid var(--border);
        }

        .skeleton-line {
            height: 1.2rem;
            background: linear-gradient(90deg, var(--border) 25%, var(--border-light) 50%, var(--border) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 0.5rem;
            margin-bottom: 0.75rem;
        }

        .skeleton-line.short {
            width: 60%;
            height: 0.8rem;
        }

        .skeleton-badge {
            width: 4rem;
            height: 1.8rem;
            background: linear-gradient(90deg, var(--border) 25%, var(--border-light) 50%, var(--border) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 2rem;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* No result & suggestions */
        .no-result {
            text-align: center;
            padding: 3rem;
            display: none;
        }
        .no-result.visible { display: block; }
        .no-result-icon { font-size: 3rem; opacity: 0.5; }
        .suggestion-chips {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        .suggestion-chip {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
        }

        /* Error message */
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border-left: 4px solid var(--error);
            padding: 0.8rem 1rem;
            border-radius: 1rem;
            margin-bottom: 1.5rem;
            display: none;
            text-align: center;
        }
        .error-message.visible { display: block; }

        /* Scroll top */
        .scroll-top {
            position: fixed;
            bottom: 5rem;
            right: 1.5rem;
            background: var(--primary);
            color: white;
            width: 2.8rem;
            height: 2.8rem;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--shadow-lg);
            transition: var(--transition);
            border: none;
            font-size: 1.3rem;
            z-index: 30;
        }
        .scroll-top.visible { display: flex; }

        /* WhatsApp button */
        .wa-container {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 30;
        }
        .wa-float {
            display: flex;
            gap: 0.5rem;
            background: var(--success);
            padding: 0.6rem 1rem;
            border-radius: 3rem;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            box-shadow: var(--shadow-lg);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 1.5rem;
            border-top: 1px solid var(--border);
            font-size: 0.7rem;
            color: var(--subtext);
        }

        /* Responsive */
        @media (max-width: 640px) {
            .title { font-size: 1.3rem; }
            .cards-grid { grid-template-columns: 1fr; gap: 1rem; }
            .container { padding: 0 1rem; }
        }
    </style>
</head>

<body>
<div class="page">
    <div class="header" id="header">
        <div class="header-inner">
            <div class="title">📡 Cek Area XL Akrab</div>
            <div class="search-area">
                <div class="search-wrapper">
                    <input type="text" id="searchInput" class="search-input" placeholder="Cari provinsi atau kota..." autocomplete="off">
                    <button class="search-clear" id="searchClear">✕</button>
                </div>
                <div class="search-shortcut" id="searchShortcut">⚡ Tekan <kbd>Ctrl+/</kbd> untuk fokus</div>
                <div class="popular-searches" id="popularSearches">
                    <span class="popular-label">Populer:</span>
                    <button class="popular-chip" data-search="jakarta">Jakarta</button>
                    <button class="popular-chip" data-search="surabaya">Surabaya</button>
                    <button class="popular-chip" data-search="bandung">Bandung</button>
                    <button class="popular-chip" data-search="bali">Bali</button>
                    <button class="popular-chip" data-search="medan">Medan</button>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="error-message" id="errorMessage"></div>
        <div class="results-count" id="resultsCount"></div>

        <!-- skeleton loader -->
        <div class="skeleton-grid" id="skeletonGrid">
            <div class="skeleton-card"><div class="skeleton-line"></div><div class="skeleton-line short"></div><div class="skeleton-badge"></div></div>
            <div class="skeleton-card"><div class="skeleton-line"></div><div class="skeleton-line short"></div><div class="skeleton-badge"></div></div>
            <div class="skeleton-card"><div class="skeleton-line"></div><div class="skeleton-line short"></div><div class="skeleton-badge"></div></div>
        </div>

        <div id="dataContainer" class="cards-grid"></div>

        <div class="no-result" id="noResult">
            <div class="no-result-icon">🔍</div>
            <div class="no-result-text">Wilayah tidak ditemukan</div>
            <div class="no-result-hint">Coba kata kunci lain</div>
            <div class="suggestion-chips" id="suggestionChips"></div>
        </div>
    </div>

    <div class="footer">
        <p>© 2026 AXXO STORE — Paket XL Akrab</p>
    </div>

    <button class="scroll-top" id="scrollTopBtn">↑</button>

    <div class="wa-container">
        <a href="https://wa.me/6283865626030?text=Halo%20Admin,%20saya%20ingin%20order%20Paket%20XL%20Akrab" target="_blank" class="wa-float">
            <svg width="18" height="18" viewBox="0 0 32 32" fill="white"><path d="M19.11 17.53c-.27-.14-1.6-.79-1.85-.88-.25-.09-.43-.14-.61.14-.18.27-.7.88-.86 1.06-.16.18-.32.2-.59.07-.27-.14-1.14-.42-2.18-1.34-.81-.72-1.36-1.61-1.52-1.88-.16-.27-.02-.42.12-.56.13-.13.27-.33.4-.5.14-.16.18-.27.27-.45.09-.18.05-.33-.02-.46-.07-.13-.61-1.47-.84-2.01-.22-.53-.45-.46-.61-.46-.15 0-.33-.02-.5-.02-.17 0-.44.06-.67.31-.24.25-.9.88-.9 2.14 0 1.26.92 2.48 1.05 2.65.13.17 1.84 2.81 4.46 3.94.62.27 1.1.43 1.48.56.62.2 1.19.17 1.64.1.5-.08 1.54-.63 1.75-1.23.21-.6.21-1.12.15-1.23-.07-.11-.24-.17-.5-.3z"/></svg>
            <span>Order via WA</span>
        </a>
    </div>

    <script>
        // Same robust functionality as before, with slight adjustments for new layout
        const CONFIG = { DATA_URL: 'data.json', DEBOUNCE_DELAY: 250, SCROLL_THRESHOLD: 10 };
        let state = { allData: [], searchQuery: '' };

        const elements = {
            searchInput: document.getElementById('searchInput'), searchClear: document.getElementById('searchClear'),
            dataContainer: document.getElementById('dataContainer'), noResult: document.getElementById('noResult'),
            resultsCount: document.getElementById('resultsCount'), skeletonGrid: document.getElementById('skeletonGrid'),
            errorMessage: document.getElementById('errorMessage'), header: document.getElementById('header'),
            searchShortcut: document.getElementById('searchShortcut'), scrollTopBtn: document.getElementById('scrollTopBtn'),
            suggestionChips: document.getElementById('suggestionChips'), popularChips: document.querySelectorAll('.popular-chip')
        };

        function escapeHtml(t) { if(!t) return ''; const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }
        function showError(msg) { elements.errorMessage.textContent='⚠️ '+msg; elements.errorMessage.classList.add('visible'); }
        function hideError() { elements.errorMessage.classList.remove('visible'); }
        function highlightText(text, kw) {
            if(!kw) return escapeHtml(text);
            const safe=kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
            const regex=new RegExp(`(${safe})`,'gi');
            return escapeHtml(text).replace(regex,'<mark>$1</mark>');
        }
        function updateURLState(q) { const url=new URL(window.location); q ? url.searchParams.set('q',q) : url.searchParams.delete('q'); history.pushState({},'',url); }

        function renderCards(data, keyword='', isSearching=false) {
            elements.dataContainer.innerHTML='';
            if(!data || data.length===0) {
                elements.noResult.classList.add('visible');
                elements.resultsCount.classList.remove('visible');
                renderSuggestions(keyword);
                return;
            }
            elements.noResult.classList.remove('visible');
            if(isSearching && keyword) {
                elements.resultsCount.classList.add('visible');
                elements.resultsCount.textContent = `Ditemukan ${data.length} hasil`;
            } else elements.resultsCount.classList.remove('visible');

            const frag = document.createDocumentFragment();
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.setAttribute('tabindex','0');
                card.innerHTML = `
                    <div class="provinsi">
                        <span>${highlightText(item.provinsi, keyword)}</span>
                        <span class="badge">${escapeHtml(item.area)}</span>
                    </div>
                    <div class="kota">${highlightText(item.kota, keyword)}</div>
                `;
                frag.appendChild(card);
            });
            elements.dataContainer.appendChild(frag);
            hideError();
        }

        function renderSuggestions(keyword) {
            if(!keyword) { elements.suggestionChips.innerHTML=''; return; }
            const suggestions = ['Jakarta','Surabaya','Bandung','Medan','Bali','Yogyakarta','Semarang']
                .filter(s => s.toLowerCase().includes(keyword.toLowerCase())).slice(0,5);
            elements.suggestionChips.innerHTML = suggestions.map(s => `<button class="suggestion-chip" data-suggestion="${escapeHtml(s)}">${escapeHtml(s)}</button>`).join('');
            document.querySelectorAll('.suggestion-chip').forEach(chip => {
                chip.addEventListener('click',()=>{ elements.searchInput.value=chip.dataset.suggestion; updateSearchQuery(chip.dataset.suggestion); });
            });
        }

        function filterAndRender() {
            const kw = state.searchQuery.trim().toLowerCase();
            const isSearching = kw.length>0;
            let filtered = state.allData;
            if(isSearching) filtered = state.allData.filter(item => item.provinsi.toLowerCase().includes(kw) || item.kota.toLowerCase().includes(kw));
            if(!isSearching) {
                renderCards(state.allData,'',false);
                elements.searchClear.classList.remove('visible');
            } else {
                elements.searchClear.classList.add('visible');
                renderCards(filtered, kw, true);
            }
        }
        function updateSearchQuery(v) { state.searchQuery=v; filterAndRender(); updateURLState(v); }

        const debounce = (fn,delay) => { let t; return (...args)=>{ clearTimeout(t); t=setTimeout(()=>fn(...args),delay); }; };
        const handleSearchInput = debounce((e) => updateSearchQuery(e.target.value), CONFIG.DEBOUNCE_DELAY);
        function clearSearch() { elements.searchInput.value=''; updateSearchQuery(''); elements.searchInput.focus(); }
        function initSearchListeners() {
            elements.searchInput.addEventListener('input', handleSearchInput);
            elements.searchClear.addEventListener('click', clearSearch);
            elements.searchInput.addEventListener('keydown', e=>{ if(e.key==='Escape') clearSearch(); });
            document.addEventListener('keydown', e=>{ if((e.ctrlKey||e.metaKey) && e.key==='/'){ e.preventDefault(); elements.searchInput.focus(); } });
            elements.popularChips.forEach(chip => chip.addEventListener('click', ()=>{ elements.searchInput.value=chip.dataset.search; updateSearchQuery(chip.dataset.search); }));
        }

        function showSkeleton() { elements.skeletonGrid.style.display='grid'; elements.dataContainer.style.display='none'; }
        function hideSkeleton() { elements.skeletonGrid.style.display='none'; elements.dataContainer.style.display='grid'; }

        async function loadData() {
            try {
                showSkeleton(); hideError();
                const res = await fetch(`${CONFIG.DATA_URL}?t=${Date.now()}`);
                if(!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                if(!Array.isArray(data) || data.length===0) throw new Error('Data kosong');
                state.allData = data;
                hideSkeleton();
                const urlQuery = new URLSearchParams(location.search).get('q');
                if(urlQuery) { elements.searchInput.value = urlQuery; updateSearchQuery(urlQuery); }
                else renderCards(data);
                initSearchListeners();
            } catch(err) {
                hideSkeleton();
                showError(`Gagal memuat data: ${err.message}`);
                elements.dataContainer.innerHTML = '';
                elements.noResult.classList.add('visible');
            }
        }

        // Scroll effects & device detection (same as before, but shortened)
        let scrollTimeout, lastScroll=0;
        function handleScroll() { if(scrollTimeout) cancelAnimationFrame(scrollTimeout); scrollTimeout=requestAnimationFrame(()=>{ const scrolled=window.scrollY>CONFIG.SCROLL_THRESHOLD; elements.header.classList.toggle('scrolled',scrolled); elements.scrollTopBtn.classList.toggle('visible',window.scrollY>300); }); }
        function isDesktop() { return window.innerWidth>=768 && (window.matchMedia('(hover: hover) and (pointer: fine)').matches || !('ontouchstart' in window)); }
        function toggleShortcut() { elements.searchShortcut.style.display = isDesktop() ? 'block' : 'none'; }
        window.addEventListener('scroll', handleScroll, {passive:true});
        window.addEventListener('resize', ()=>{ toggleShortcut(); });
        elements.scrollTopBtn.addEventListener('click', ()=>window.scrollTo({top:0,behavior:'smooth'}));
        toggleShortcut();

        // Pull to refresh (mobile)
        let touchStart=0, refreshing=false;
        document.addEventListener('touchstart', e=>{ if(window.scrollY===0) touchStart=e.touches[0].clientY; }, {passive:true});
        document.addEventListener('touchmove', e=>{ if(touchStart && !refreshing && window.scrollY===0 && (e.touches[0].clientY - touchStart)>60) { refreshing=true; location.reload(); } }, {passive:true});

        // URL back/forward
        window.addEventListener('popstate', ()=>{ const q=new URLSearchParams(location.search).get('q')||''; elements.searchInput.value=q; updateSearchQuery(q); });

        loadData();
    </script>
</body>
</html>
