<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cek Area XL Akrab</title>

<style>
/* ================= ROOT THEME ================= */
:root {
    --primary: #2563eb;

    /* LIGHT MODE */
    --bg: #f8fafc;
    --card: #ffffff;
    --text: #0f172a;
    --subtext: #64748b;
    --border: #e2e8f0;
}

/* 🌙 AUTO DARK MODE */
@media (prefers-color-scheme: dark) {
:root {
    --bg: #020617;
    --card: #0f172a;
    --text: #e2e8f0;
    --subtext: #94a3b8;
    --border: #1e293b;
}
}

/* ================= RESET ================= */
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* ================= LAYOUT ================= */
.page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* ================= HEADER ================= */
.header {
    position: sticky;
    top: 0;

    /* Same style as badge */
    background: linear-gradient(135deg, #2563eb, #1d4ed8);

    padding: 15px;
    border-bottom: none;
    z-index: 10;

    color: white;
}

.header.scrolled {
    box-shadow: 0 6px 20px rgba(0,0,0,0.1);
}

/* TITLE */
.title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 10px;
    color: white;
}

/* SEARCH */
.search-box {
    margin-top: 10px;
}
.search-box input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-size: 14px;

    background: rgba(255,255,255,0.15);
    color: white;
    backdrop-filter: blur(6px);
}

.search-box input::placeholder {
    color: rgba(255,255,255,0.7);
}

.search-box input:focus {
    outline: none;
    background: rgba(255,255,255,0.25);
}
/* ================= CONTAINER ================= */
.container {
    max-width: 900px;
    margin: auto;
    padding: 16px;
    flex: 1;
}

/* ================= CARD ================= */
.card {
    background: var(--card);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 14px;
    border: 1px solid var(--border);
    transition: 0.2s;
}

.card:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

/* TEXT */
.provinsi {
    font-weight: 800;
}

.kota {
    font-size: 13.5px;
    color: var(--subtext);
    margin: 6px 0 10px;
    line-height: 1.5;
}

/* BADGE */
.badge {
    display: inline-block;
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.3px;

    /* Blue style (clean + modern) */
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    color: #fff;

    box-shadow: 0 4px 10px rgba(37, 99, 235, 0.25);
    transition: all 0.2s ease;
}

/* HIGHLIGHT */
mark {
    background: #fde68a;
    border-radius: 4px;
}

/* NO RESULT */
#noResult {
    text-align: center;
    margin-top: 20px;
    color: red;
    display: none;
}

/* ================= FOOTER ================= */
.footer {
    margin-top: auto;
    padding: 20px;
    text-align: center;
    font-size: 12px;
    color: var(--subtext);
}

/* ================= WA BUTTON ================= */
.wa-container {
    position: fixed;
    bottom: 20px;
    right: 20px;
}

.wa-float {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: #25D366;
    border-radius: 999px;
    color: white;
    text-decoration: none;
    font-weight: 600;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    transition: 0.2s;
}

.wa-float:hover {
    transform: translateY(-3px);
}

.wa-icon {
    width: 20px;
    fill: white;
}
</style>
</head>

<body>

<div class="page">

<!-- HEADER -->
<div class="header" id="header">
    <div class="title">Cek Area Paket XL Akrab</div>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Cari provinsi / kota...">
    </div>
</div>

<!-- CONTENT -->
<div class="container">
    <div id="dataContainer"></div>
    <p id="noResult">Wilayah tidak ditemukan</p>
</div>

<!-- FOOTER -->
<div class="footer">©2026 AXXO STORE</div>

</div>

<!-- WA BUTTON -->
<div class="wa-container">
<a href="https://wa.me/6283865626030?text=Halo%20Admin,%20saya%20ingin%20order%20Paket%20XL%20Akrab"
   target="_blank" class="wa-float">
<svg class="wa-icon" viewBox="0 0 32 32">
<path d="M19.11 17.53c-.27-.14-1.6-.79-1.85-.88-.25-.09-.43-.14-.61.14-.18.27-.7.88-.86 1.06-.16.18-.32.2-.59.07-.27-.14-1.14-.42-2.18-1.34-.81-.72-1.36-1.61-1.52-1.88-.16-.27-.02-.42.12-.56.13-.13.27-.32.41-.48.14-.16.18-.27.27-.45.09-.18.05-.34-.02-.48-.07-.14-.61-1.47-.84-2.01-.22-.53-.45-.46-.61-.47-.16-.01-.34-.01-.52-.01-.18 0-.48.07-.73.34-.25.27-.95.93-.95 2.26 0 1.32.97 2.6 1.11 2.78.14.18 1.92 2.93 4.66 4.11.65.28 1.15.45 1.54.58.65.21 1.24.18 1.71.11.52-.08 1.6-.65 1.83-1.28.23-.63.23-1.17.16-1.28-.07-.11-.25-.18-.52-.32z"/>
</svg>
Order
</a>
</div>

<script>
let allData = [];

/* LOAD DATA */
fetch('data.json')
.then(res => res.json())
.then(data => {
    allData = data;
    renderCards(data);
});

/* RENDER */
function renderCards(data, keyword = '') {
    const container = document.getElementById('dataContainer');
    let html = '';

    for (let i = 0; i < data.length; i++) {
        const item = data[i];

        html += `
        <div class="card">
            <div class="provinsi">${keyword ? highlight(item.provinsi, keyword) : item.provinsi}</div>
            <div class="kota">${keyword ? highlight(item.kota, keyword) : item.kota}</div>
            <span class="badge">${item.area}</span>
        </div>`;
    }

    container.innerHTML = html;
}

/* SAFE HIGHLIGHT */
function highlight(text, keyword) {
    const safe = keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return text.replace(new RegExp(`(${safe})`, 'gi'), '<mark>$1</mark>');
}

/* FAST SEARCH */
document.getElementById('searchInput').addEventListener('input', function () {
    const input = this.value.trim().toLowerCase();

    if (!input) {
        renderCards(allData);
        document.getElementById('noResult').style.display = 'none';
        return;
    }

    const filtered = [];

    for (let i = 0; i < allData.length; i++) {
        const item = allData[i];

        if (
            item.provinsi.toLowerCase().includes(input) ||
            item.kota.toLowerCase().includes(input)
        ) {
            filtered.push(item);
        }
    }

    renderCards(filtered, input);

    document.getElementById('noResult').style.display =
        filtered.length === 0 ? 'block' : 'none';
});

/* HEADER ANIMATION */
window.addEventListener('scroll', () => {
    document.getElementById('header')
    .classList.toggle('scrolled', window.scrollY > 20);
});
</script>

</body>
</html>
